<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="440" viewBox="0 0 1120 440" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="jp-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#818cf8" /></marker>
  </defs>
  <rect width="1120" height="440" fill="#0a0a0a" />

  <text x="56" y="56" fill="#f8fafc" font-size="26" font-weight="700">Releases that ship themselves — no hands, no secrets</text>
  <text x="56" y="90" fill="#94a3b8" font-size="16">A merge becomes a published version automatically, signed in by identity instead of a stored password.</text>

  <!-- pipeline nodes -->
  <!-- 1 merge -->
  <rect x="56" y="150" width="186" height="110" rx="12" fill="#0d1117" stroke="#334155" stroke-width="1.3" />
  <text x="149" y="196" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">Merge a change</text>
  <text x="149" y="224" text-anchor="middle" fill="#94a3b8" font-size="13">into the main branch</text>

  <!-- 2 release-please -->
  <rect x="288" y="150" width="200" height="110" rx="12" fill="#0d1117" stroke="#334155" stroke-width="1.3" />
  <text x="388" y="190" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">Pick the version</text>
  <text x="388" y="216" text-anchor="middle" fill="#94a3b8" font-size="13">a bot reads the commits</text>
  <text x="388" y="236" text-anchor="middle" fill="#94a3b8" font-size="13">and bumps the number</text>

  <!-- 3 tag -->
  <rect x="534" y="150" width="186" height="110" rx="12" fill="#0d1117" stroke="#334155" stroke-width="1.3" />
  <text x="627" y="190" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">Tag the release</text>
  <text x="627" y="216" text-anchor="middle" fill="#94a3b8" font-size="13">a version tag triggers</text>
  <text x="627" y="236" text-anchor="middle" fill="#94a3b8" font-size="13">the publish step</text>

  <!-- 4 OIDC publish -->
  <rect x="766" y="150" width="298" height="110" rx="12" fill="#0b1f24" stroke="#22d3ee" stroke-width="2" />
  <text x="915" y="184" text-anchor="middle" fill="#67e8f9" font-size="15" font-weight="700">Publish to PyPI</text>
  <text x="915" y="210" text-anchor="middle" fill="#cbd5e1" font-size="13">proven by identity (OIDC) —</text>
  <text x="915" y="230" text-anchor="middle" fill="#cbd5e1" font-size="13">no stored token to leak</text>
  <text x="915" y="250" text-anchor="middle" fill="#67e8f9" font-size="12.5" font-weight="700">pip install jaxbo</text>

  <!-- arrows -->
  <path d="M242 205 H286" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#jp-ar)" />
  <path d="M488 205 H532" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#jp-ar)" />
  <path d="M720 205 H764" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#jp-ar)" />

  <!-- footnote chips -->
  <rect x="56" y="312" width="1008" height="78" rx="12" fill="#0b0e14" stroke="#1e293b" stroke-width="1.1" />
  <text x="80" y="342" fill="#94a3b8" font-size="14" font-weight="700">WHY IT MATTERS</text>
  <text x="80" y="370" fill="#cbd5e1" font-size="14.5">Two real versions shipped this way (0.1.1 and 0.1.2). This release automation is the cleanest, most reusable piece of the project.</text>
</svg>
