<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="450" viewBox="0 0 1120 450" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="1120" height="450" fill="#0a0a0a" />

  <text x="56" y="56" fill="#f8fafc" font-size="26" font-weight="700">Honest credit: what's upstream vs. what's mine</text>
  <text x="56" y="90" fill="#94a3b8" font-size="16">The Bayesian-optimization research is the Predictive Intelligence Lab's. The work here is making it install, lint, test, and ship.</text>

  <!-- upstream column -->
  <rect x="56" y="122" width="488" height="284" rx="14" fill="#0d1117" stroke="#7f5418" stroke-width="1.5" />
  <text x="84" y="160" fill="#e7c38a" font-size="17" font-weight="700">Upstream — the research math</text>
  <text x="84" y="184" fill="#64748b" font-size="13">© Predictive Intelligence Lab · cited &amp; credited</text>
  <g font-size="15" fill="#cbd5e1">
    <circle cx="92" cy="216" r="3" fill="#e7c38a" />
    <text x="110" y="221">the prediction model (Gaussian process)</text>
    <circle cx="92" cy="252" r="3" fill="#e7c38a" />
    <text x="110" y="257">the rules for choosing the next test</text>
    <circle cx="92" cy="288" r="3" fill="#e7c38a" />
    <text x="110" y="293">the kernels and benchmark functions</text>
    <circle cx="92" cy="324" r="3" fill="#e7c38a" />
    <text x="110" y="329">the multi-fidelity &amp; manifold variants</text>
    <circle cx="92" cy="360" r="3" fill="#e7c38a" />
    <text x="110" y="365">the original JAX implementation</text>
  </g>

  <!-- mine column -->
  <rect x="576" y="122" width="488" height="284" rx="14" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.7" />
  <text x="604" y="160" fill="#67e8f9" font-size="17" font-weight="700">Mine — the distribution engineering</text>
  <text x="604" y="184" fill="#64748b" font-size="13">the part that makes it usable today</text>
  <g font-size="15" fill="#cbd5e1">
    <path d="M606 209 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
    <text x="636" y="221">fixed it to install on current Python &amp; JAX</text>
    <path d="M606 245 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
    <text x="636" y="257">a clean, installable package (pip install jaxbo)</text>
    <path d="M606 281 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
    <text x="636" y="293">continuous testing &amp; linting on every change</text>
    <path d="M606 317 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
    <text x="636" y="329">automated, token-less releases to PyPI</text>
    <path d="M606 353 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
    <text x="636" y="365">docs &amp; demos brought back to life</text>
  </g>

  <text x="560" y="438" text-anchor="middle" fill="#64748b" font-size="14">The defensible claim is &#8220;I made the research installable,&#8221; not &#8220;I built the research.&#8221;</text>
</svg>
