<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="&#39;Geist Mono&#39;, ui-monospace, monospace">
  <defs>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0 H0 V46" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"></path>
    </pattern>
    <radialGradient id="glow" cx="900" cy="300" r="520" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 108) scale(1 0.64)">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.12"></stop>
      <stop offset="0.7" stop-color="#22d3ee" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"></stop>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"></stop>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a"></rect>
  <rect width="1200" height="630" fill="url(#glow)"></rect>
  <rect width="1200" height="630" fill="url(#grid)"></rect>

  
  <text x="64" y="104" font-family="&#39;Geist&#39;, system-ui, sans-serif" font-size="60" font-weight="700" letter-spacing="-1.8" fill="#ffffff">JAX-BO</text>
  <text x="64" y="152" font-family="&#39;Geist&#39;, system-ui, sans-serif" font-size="22" fill="#a3a3a3">An academic Bayesian-optimization library, modernized into an installable package.</text>
  <rect x="64" y="171" width="400" height="2" fill="url(#rule)"></rect>

  
  <rect x="64" y="236" width="404" height="190" rx="16" fill="#ffffff" fill-opacity="0.012" stroke="#fbbf24" stroke-opacity="0.55" stroke-width="1.5"></rect>
  <rect x="732" y="236" width="404" height="190" rx="16" fill="#ffffff" fill-opacity="0.012" stroke="#22d3ee" stroke-width="1.5"></rect>

  <g text-anchor="middle">
    
    <text x="266" y="272" font-size="13" font-weight="700" letter-spacing="2.34" fill="#fbbf24">BEFORE</text>
    <g font-family="&#39;Geist&#39;, system-ui, sans-serif" font-weight="700" font-size="27" letter-spacing="-0.3" fill="#f5f5f5">
      <text x="266" y="312">Research code, hard to</text>
      <text x="266" y="343">install</text>
    </g>
    <g font-size="15" fill="#a3a3a3">
      <text x="266" y="378">An academic repo that no longer</text>
      <text x="266" y="399">installed on current Python and JAX.</text>
    </g>

    
    <text x="934" y="272" font-size="13" font-weight="700" letter-spacing="2.34" fill="#22d3ee">AFTER</text>
    <text x="934" y="326" font-family="&#39;Geist&#39;, system-ui, sans-serif" font-weight="700" font-size="27" letter-spacing="-0.3" fill="#7dd3fc">pip install jaxbo</text>
    <g font-size="15" fill="#a3a3a3">
      <text x="934" y="378">Modern Python, linted and tested,</text>
      <text x="934" y="399">published to PyPI on release.</text>
    </g>
  </g>

  
  <text x="596" y="315" text-anchor="middle" font-size="13" letter-spacing="0.78" fill="#818cf8">modernize · package · publish</text>
  <line x1="486" y1="331" x2="703" y2="331" stroke="#818cf8" stroke-width="2"></line>
  <path d="M703 324 L715 331 L703 338 Z" fill="#818cf8"></path>

  
  <rect x="64" y="470" width="1072" height="96" rx="14" fill="#ffffff" fill-opacity="0.012" stroke="#262626" stroke-width="1"></rect>
  <line x1="600" y1="470" x2="600" y2="566" stroke="#262626" stroke-width="1"></line>

  <text x="92" y="503" font-size="12.5" font-weight="700" letter-spacing="1.25" fill="#fbbf24">THE MATH · UPSTREAM</text>
  <g font-size="16" fill="#d4d4d4">
    <text x="92" y="529">Gaussian-process Bayesian optimization, by the</text>
    <text x="92" y="550">Predictive Intelligence Lab.</text>
  </g>

  <text x="628" y="503" font-size="12.5" font-weight="700" letter-spacing="1.25" fill="#22d3ee">THE PACKAGING · THE CONTRIBUTION</text>
  <g font-size="16" fill="#d4d4d4">
    <text x="628" y="529">Made it install, lint, test, and ship itself</text>
    <text x="628" y="550">on modern Python.</text>
  </g>
</svg>