<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="450" viewBox="0 0 1120 450" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="1120" height="450" fill="#0a0a0a" />
  <text x="48" y="48" fill="#e2e8f0" font-size="20" font-weight="700">Honest scope — what's proven, and where the depth ends</text>
  <text x="48" y="74" fill="#64748b" font-size="13">A 2-day spike, read as one. The value is a verified guarantee; the boundary is named, not hidden.</text>

  <!-- proven panel -->
  <rect x="48" y="104" width="500" height="298" rx="12" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.3" />
  <text x="72" y="138" fill="#67e8f9" font-size="14" font-weight="700">PROVEN &amp; COMMITTED</text>
  <g font-size="13">
    <path d="M76 172 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="178" fill="#cbd5e1">token-exact chunker across the PyO3 seam</text>
    <path d="M76 212 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="218" fill="#cbd5e1">0 over-limit chunks at every scale (vs 13,100)</text>
    <path d="M76 252 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="258" fill="#cbd5e1">40% speedup @ 50 MB, in a committed CSV</text>
    <path d="M76 292 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="298" fill="#cbd5e1">working CLI: init-db / ingest / search / ask</text>
    <path d="M76 332 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="338" fill="#cbd5e1">25 tests · Qdrant e2e auto-skips when down</text>
    <path d="M76 372 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="378" fill="#cbd5e1">benchmark keeps its own negative result</text>
  </g>

  <!-- boundary panel -->
  <rect x="572" y="104" width="500" height="298" rx="12" fill="#0b0e14" stroke="#475569" stroke-width="1.2" />
  <text x="596" y="138" fill="#94a3b8" font-size="14" font-weight="700">WHERE THE DEPTH ENDS</text>
  <g font-size="13" fill="#94a3b8">
    <text x="596" y="178">→ live ingest runs the sequential chunker;</text>
    <text x="616" y="198" fill="#64748b" font-size="11.5">the parallel path that wins is benchmark-only</text>
    <text x="596" y="238">→ no CI — no .github, no wheel matrix, no publish</text>
    <text x="596" y="278">→ not on PyPI or crates.io; no tags, no releases</text>
    <text x="596" y="318">→ no ingest-side error handling</text>
    <text x="616" y="338" fill="#64748b" font-size="11.5">malformed doc / API failure / Qdrant down → raw traceback</text>
    <text x="596" y="378">→ embedding backend picked by env, not a flag</text>
  </g>

  <text x="560" y="436" text-anchor="middle" fill="#64748b" font-size="12">Every line on the right is verifiable from the repo — surfaced here rather than discovered in an interview.</text>
</svg>
