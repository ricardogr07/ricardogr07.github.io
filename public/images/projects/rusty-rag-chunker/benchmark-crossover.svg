<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="1120" height="500" fill="#0a0a0a" />
  <text x="48" y="48" fill="#e2e8f0" font-size="20" font-weight="700">The Rust win is real but narrow — a measured 10–50 MB crossover</text>
  <text x="48" y="74" fill="#64748b" font-size="13">Below the crossover, FFI + BPE-init cost dominates and pure Python wins. The benchmark reports it both ways.</text>

  <!-- table header -->
  <g font-size="12.5" fill="#94a3b8">
    <text x="64" y="128">corpus</text>
    <text x="280" y="128">python tiktoken</text>
    <text x="540" y="128">rust parallel</text>
    <text x="800" y="128">winner</text>
  </g>
  <line x1="48" y1="142" x2="1072" y2="142" stroke="#1e293b" stroke-width="1" />

  <!-- rows -->
  <g font-size="13.5">
    <!-- tiny -->
    <text x="64" y="180" fill="#cbd5e1">0.01 MB</text>
    <text x="280" y="180" fill="#67e8f9">0.006 s</text>
    <text x="540" y="180" fill="#94a3b8">10.40 s</text>
    <rect x="796" y="166" width="92" height="22" rx="11" fill="#0b1f24" stroke="#22d3ee" stroke-width="1" />
    <text x="842" y="181" text-anchor="middle" fill="#67e8f9" font-size="11.5">Python</text>
    <line x1="48" y1="200" x2="1072" y2="200" stroke="#13181f" stroke-width="1" />

    <!-- small -->
    <text x="64" y="234" fill="#cbd5e1">1 MB</text>
    <text x="280" y="234" fill="#67e8f9">0.80 s</text>
    <text x="540" y="234" fill="#94a3b8">10.11 s</text>
    <rect x="796" y="220" width="92" height="22" rx="11" fill="#0b1f24" stroke="#22d3ee" stroke-width="1" />
    <text x="842" y="235" text-anchor="middle" fill="#67e8f9" font-size="11.5">Python</text>
    <line x1="48" y1="254" x2="1072" y2="254" stroke="#13181f" stroke-width="1" />

    <!-- medium -->
    <text x="64" y="288" fill="#cbd5e1">10 MB</text>
    <text x="280" y="288" fill="#67e8f9">6.75 s</text>
    <text x="392" y="288" fill="#475569" font-size="11">1.48 MB/s</text>
    <text x="540" y="288" fill="#94a3b8">11.40 s</text>
    <text x="652" y="288" fill="#475569" font-size="11">0.88 MB/s</text>
    <rect x="796" y="274" width="92" height="22" rx="11" fill="#0b1f24" stroke="#22d3ee" stroke-width="1" />
    <text x="842" y="289" text-anchor="middle" fill="#67e8f9" font-size="11.5">Python</text>

    <!-- crossover marker -->
    <g>
      <line x1="48" y1="308" x2="1072" y2="308" stroke="#f59e0b" stroke-width="1.4" stroke-dasharray="6 4" />
      <rect x="470" y="298" width="180" height="20" rx="10" fill="#140f02" stroke="#f59e0b" stroke-width="1" />
      <text x="560" y="312" text-anchor="middle" fill="#fcd34d" font-size="11">⟂ crossover: 10–50 MB</text>
    </g>

    <!-- large -->
    <text x="64" y="346" fill="#cbd5e1">50 MB</text>
    <text x="280" y="346" fill="#94a3b8">35.04 s</text>
    <text x="392" y="346" fill="#475569" font-size="11">1.43 MB/s</text>
    <text x="540" y="346" fill="#67e8f9">24.99 s</text>
    <text x="652" y="346" fill="#7dd3fc" font-size="11">2.00 MB/s</text>
    <rect x="796" y="332" width="118" height="22" rx="11" fill="#0b1f24" stroke="#67e8f9" stroke-width="1.2" />
    <text x="855" y="347" text-anchor="middle" fill="#67e8f9" font-size="11.5" font-weight="700">Rust · 1.40×</text>
  </g>

  <line x1="48" y1="384" x2="1072" y2="384" stroke="#1e293b" stroke-width="1" />

  <!-- takeaways -->
  <g font-size="12.5">
    <text x="48" y="416" fill="#22d3ee">↗ at 50 MB the Rayon-parallel path is 40% faster: 24.99 s vs 35.04 s (2.00 vs 1.43 MB/s)</text>
    <text x="48" y="442" fill="#94a3b8">→ below ~10 MB the per-call FFI + BPE setup cost makes Rust slower — pure Python is the right call</text>
    <text x="48" y="468" fill="#64748b">⚠ committed negative result: the naive per-document Rust variant (rust_single) is the slowest everywhere — kept in the table, not hidden</text>
  </g>
</svg>
