<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <radialGradient id="rc-glow" cx="50%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#0e2a2f" />
      <stop offset="55%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </radialGradient>
    <pattern id="rc-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#16202a" stroke-width="1" />
    </pattern>
    <linearGradient id="rc-spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#rc-glow)" />
  <rect width="1200" height="630" fill="url(#rc-grid)" />

  <!-- title -->
  <text x="80" y="138" fill="#f8fafc" font-size="62" font-weight="800" letter-spacing="-1">Rusty RAG Chunker</text>
  <text x="80" y="182" fill="#94a3b8" font-size="23" font-weight="500">Token-exact chunking — the hot path in Rust, the guarantee in the math.</text>

  <!-- pill -->
  <g>
    <rect x="80" y="210" width="560" height="40" rx="20" fill="#0d1117" stroke="#22d3ee" stroke-width="1.2" />
    <circle cx="104" cy="230" r="5" fill="#22d3ee" />
    <text x="120" y="236" fill="#cbd5e1" font-size="15.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">0 over-limit chunks · 5 variants benchmarked · Rust + PyO3</text>
  </g>

  <!-- token-window guarantee visual -->
  <text x="80" y="312" fill="#64748b" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">chunks are windows over token IDs — max_tokens can never be exceeded</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <!-- window 1 -->
    <rect x="80" y="328" width="232" height="44" rx="8" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.4" />
    <g fill="#67e8f9" font-size="13" text-anchor="middle">
      <text x="104" y="356">tok</text><text x="142" y="356">tok</text><text x="180" y="356">tok</text><text x="218" y="356">tok</text><text x="256" y="356">tok</text><text x="294" y="356">…</text>
    </g>
    <!-- overlap -->
    <rect x="300" y="328" width="48" height="44" rx="8" fill="#15171f" stroke="#475569" stroke-width="1" stroke-dasharray="3 3" />
    <!-- window 2 -->
    <rect x="336" y="328" width="232" height="44" rx="8" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.4" />
    <g fill="#67e8f9" font-size="13" text-anchor="middle">
      <text x="360" y="356">tok</text><text x="398" y="356">tok</text><text x="436" y="356">tok</text><text x="474" y="356">tok</text><text x="512" y="356">tok</text><text x="550" y="356">…</text>
    </g>
    <text x="80" y="392" fill="#64748b" font-size="11.5">window = max_tokens</text>
    <text x="324" y="392" fill="#475569" font-size="11.5" text-anchor="middle">overlap</text>
  </g>

  <!-- pipeline spine -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <line x1="80" y1="452" x2="1024" y2="452" stroke="url(#rc-spine)" stroke-width="2.5" />
    <g text-anchor="middle">
      <g><circle cx="160" cy="452" r="7" fill="#0a0a0a" stroke="#22d3ee" stroke-width="2.5" /><text x="160" y="430" fill="#e2e8f0" font-size="15" font-weight="700">TOKENIZE</text><text x="160" y="480" fill="#64748b" font-size="11.5">tiktoken-rs</text></g>
      <g><circle cx="420" cy="452" r="7" fill="#0a0a0a" stroke="#22d3ee" stroke-width="2.5" /><text x="420" y="430" fill="#e2e8f0" font-size="15" font-weight="700">CHUNK</text><text x="420" y="480" fill="#64748b" font-size="11.5">Rust · PyO3 boundary</text></g>
      <g><circle cx="680" cy="452" r="7" fill="#0a0a0a" stroke="#818cf8" stroke-width="2.5" /><text x="680" y="430" fill="#e2e8f0" font-size="15" font-weight="700">EMBED</text><text x="680" y="480" fill="#64748b" font-size="11.5">MiniLM 384d / OpenAI 1536d</text></g>
      <g><circle cx="944" cy="452" r="7" fill="#0a0a0a" stroke="#818cf8" stroke-width="2.5" /><text x="944" y="430" fill="#e2e8f0" font-size="15" font-weight="700">QDRANT</text><text x="944" y="480" fill="#64748b" font-size="11.5">cosine · UUID5 IDs</text></g>
    </g>
  </g>

  <!-- stat strip -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <line x1="80" y1="524" x2="1120" y2="524" stroke="#1e293b" stroke-width="1" />
    <g>
      <text x="240" y="566" fill="#67e8f9" font-size="30" font-weight="800">0</text>
      <text x="240" y="592" fill="#64748b" font-size="12.5">over-limit chunks (vs 13,100)</text>
    </g>
    <g>
      <text x="600" y="566" fill="#67e8f9" font-size="30" font-weight="800">40%</text>
      <text x="600" y="592" fill="#64748b" font-size="12.5">faster than Python tiktoken @ 50 MB</text>
    </g>
    <g>
      <text x="960" y="566" fill="#67e8f9" font-size="30" font-weight="800">25</text>
      <text x="960" y="592" fill="#64748b" font-size="12.5">tests · 8 Rust + 17 Python</text>
    </g>
    <line x1="420" y1="548" x2="420" y2="596" stroke="#1e293b" stroke-width="1" />
    <line x1="780" y1="548" x2="780" y2="596" stroke="#1e293b" stroke-width="1" />
  </g>
</svg>
