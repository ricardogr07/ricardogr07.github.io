<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="sp-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#818cf8" />
    </marker>
    <marker id="sp-ar-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#22d3ee" />
    </marker>
    <marker id="sp-ar-m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569" />
    </marker>
  </defs>
  <rect width="1120" height="600" fill="#0a0a0a" />
  <text x="48" y="46" fill="#e2e8f0" font-size="20" font-weight="700">One HTTPS URL, one simulation core: a sync path and an async sweep lane</text>
  <text x="48" y="72" fill="#64748b" font-size="13">nginx + uvicorn in a single ECS Fargate task. The interactive path and the background BO sweeps reuse the exact same core code.</text>

  <!-- SYNC LANE -->
  <text x="48" y="114" fill="#94a3b8" font-size="13" font-weight="700">Request / response — the interactive path</text>

  <!-- Browser -->
  <rect x="48" y="128" width="192" height="92" rx="12" fill="#0d1117" stroke="#22d3ee" stroke-width="1.3" />
  <text x="144" y="162" text-anchor="middle" fill="#67e8f9" font-size="13.5" font-weight="700">Browser</text>
  <text x="144" y="184" text-anchor="middle" fill="#cbd5e1" font-size="11">Next.js UI</text>
  <text x="144" y="204" text-anchor="middle" fill="#64748b" font-size="10.5">tornado · housing timeline</text>

  <path d="M240 174 H296" fill="none" stroke="#818cf8" stroke-width="1.8" marker-end="url(#sp-ar)" />
  <text x="268" y="166" text-anchor="middle" fill="#64748b" font-size="10">HTTPS</text>

  <!-- nginx -->
  <rect x="300" y="128" width="160" height="92" rx="12" fill="#0d1117" stroke="#22d3ee" stroke-width="1.3" />
  <text x="380" y="162" text-anchor="middle" fill="#67e8f9" font-size="13.5" font-weight="700">nginx</text>
  <text x="380" y="184" text-anchor="middle" fill="#cbd5e1" font-size="11">one ALB · no CORS</text>
  <text x="380" y="204" text-anchor="middle" fill="#64748b" font-size="10.5">proxies /api/*</text>

  <path d="M460 174 H516" fill="none" stroke="#818cf8" stroke-width="1.8" marker-end="url(#sp-ar)" />

  <!-- FastAPI -->
  <rect x="520" y="128" width="188" height="92" rx="12" fill="#0d1117" stroke="#22d3ee" stroke-width="1.3" />
  <text x="614" y="162" text-anchor="middle" fill="#67e8f9" font-size="13.5" font-weight="700">FastAPI</text>
  <text x="614" y="184" text-anchor="middle" fill="#cbd5e1" font-size="11">sync request path</text>
  <text x="614" y="204" text-anchor="middle" fill="#64748b" font-size="10.5">+ SSE progress stream</text>

  <path d="M708 174 H868" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#sp-ar-c)" />
  <text x="788" y="166" text-anchor="middle" fill="#64748b" font-size="10">calls directly</text>

  <!-- CORE (shared, spans both lanes) -->
  <rect x="872" y="150" width="200" height="300" rx="12" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.8" />
  <text x="972" y="184" text-anchor="middle" fill="#67e8f9" font-size="13.5" font-weight="700">shelterpulse / core</text>
  <text x="972" y="206" text-anchor="middle" fill="#f8fafc" font-size="10.5" font-weight="700">pure · zero I/O</text>
  <line x1="892" y1="222" x2="1052" y2="222" stroke="#164e5a" stroke-width="1" />
  <text x="972" y="248" text-anchor="middle" fill="#cbd5e1" font-size="11">SimPy DES engine</text>
  <text x="972" y="270" text-anchor="middle" fill="#cbd5e1" font-size="11">seasonal Poisson intake</text>
  <text x="972" y="292" text-anchor="middle" fill="#cbd5e1" font-size="11">common random numbers</text>
  <text x="972" y="320" text-anchor="middle" fill="#a5b4fc" font-size="11">GP + EI Bayesian opt</text>
  <text x="972" y="342" text-anchor="middle" fill="#64748b" font-size="10.5">Dirichlet fallback</text>
  <text x="972" y="370" text-anchor="middle" fill="#cbd5e1" font-size="11">5 baselines scored</text>
  <text x="972" y="398" text-anchor="middle" fill="#64748b" font-size="10.5">no api/cli imports</text>
  <text x="972" y="418" text-anchor="middle" fill="#64748b" font-size="10.5">(CI-enforced)</text>

  <!-- ASYNC LANE -->
  <text x="48" y="300" fill="#94a3b8" font-size="13" font-weight="700">BO sweeps — dispatched to background workers</text>

  <!-- FastAPI -> queue -->
  <path d="M600 220 V262 H388 V316" fill="none" stroke="#818cf8" stroke-width="1.8" marker-end="url(#sp-ar)" />
  <text x="470" y="256" text-anchor="middle" fill="#64748b" font-size="10">enqueue sweep</text>

  <!-- queue -->
  <rect x="300" y="316" width="176" height="92" rx="12" fill="#0d1117" stroke="#818cf8" stroke-width="1.3" />
  <text x="388" y="350" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">queue</text>
  <text x="388" y="372" text-anchor="middle" fill="#cbd5e1" font-size="11">RabbitMQ (local)</text>
  <text x="388" y="392" text-anchor="middle" fill="#cbd5e1" font-size="11">SQS (prod)</text>

  <path d="M476 362 H516" fill="none" stroke="#818cf8" stroke-width="1.8" marker-end="url(#sp-ar)" />
  <text x="496" y="354" text-anchor="middle" fill="#64748b" font-size="10">dispatch</text>

  <!-- worker -->
  <rect x="520" y="316" width="204" height="92" rx="12" fill="#0d1117" stroke="#818cf8" stroke-width="1.3" />
  <text x="622" y="350" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">worker</text>
  <text x="622" y="372" text-anchor="middle" fill="#cbd5e1" font-size="11">RabbitMQ worker / Lambda</text>
  <text x="622" y="392" text-anchor="middle" fill="#64748b" font-size="10.5">QUEUE_BACKEND flag</text>

  <!-- worker reuses core -->
  <path d="M724 362 H812 V300 H868" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#sp-ar-c)" />
  <text x="812" y="322" text-anchor="middle" fill="#64748b" font-size="10">reuses core</text>

  <!-- webhook callback (dashed) -->
  <path d="M680 316 V220" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#sp-ar-m)" />
  <text x="694" y="270" text-anchor="start" fill="#475569" font-size="10">webhook</text>

  <!-- honest footnotes -->
  <line x1="48" y1="486" x2="1072" y2="486" stroke="#1e293b" stroke-width="1" />
  <text x="48" y="514" fill="#64748b" font-size="12">Progress streams back to the browser over <tspan fill="#94a3b8">SSE</tspan>; a job stuck for 5 min is TTL-expired so the UI never hangs on a lost worker.</text>
  <text x="48" y="536" fill="#64748b" font-size="12">A baseline may win the sweep — all five named strategies are scored alongside BO candidates and labeled honestly.</text>
  <text x="48" y="558" fill="#64748b" font-size="12">Push to <tspan fill="#94a3b8">main</tspan> auto-releases and deploys via ECR. Synthetic model: numbers demonstrate the method, not a real shelter.</text>
</svg>
