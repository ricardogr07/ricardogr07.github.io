<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <radialGradient id="cs-glow" cx="50%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#0e2a2f" />
      <stop offset="55%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </radialGradient>
    <pattern id="cs-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#16202a" stroke-width="1" />
    </pattern>
    <marker id="cs-h-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#22d3ee" /></marker>
    <marker id="cs-h-i" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#818cf8" /></marker>
  </defs>

  <rect width="1200" height="630" fill="url(#cs-glow)" />
  <rect width="1200" height="630" fill="url(#cs-grid)" />

  <!-- title -->
  <text x="64" y="92" fill="#f8fafc" font-size="56" font-weight="800" letter-spacing="-1">Clipsmith</text>
  <text x="356" y="92" fill="#67e8f9" font-size="22" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">bounded-cost AI clipping</text>
  <text x="64" y="128" fill="#94a3b8" font-size="20" font-weight="500">Five free signals find the moment — the LLM only adjudicates.</text>

  <!-- INPUT -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <rect x="64" y="258" width="142" height="120" rx="12" fill="#0d1117" stroke="#475569" stroke-width="1.3" />
    <text x="135" y="298" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">INPUT</text>
    <text x="135" y="324" text-anchor="middle" fill="#cbd5e1" font-size="12.5">2–4 hr</text>
    <text x="135" y="342" text-anchor="middle" fill="#cbd5e1" font-size="12.5">Twitch VOD</text>
    <text x="135" y="364" text-anchor="middle" fill="#64748b" font-size="10.5">raw · unfiltered</text>

    <!-- arrow into signals -->
    <path d="M206 318 H230" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#cs-h-c)" />

    <!-- 5 signal pills -->
    <g>
      <!-- row1 -->
      <rect x="236" y="190" width="300" height="40" rx="9" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.3" />
      <text x="252" y="215" fill="#67e8f9" font-size="13" font-weight="600">existing Twitch clips</text>
      <rect x="470" y="199" width="56" height="22" rx="11" fill="#0a0a0a" stroke="#22d3ee" stroke-width="1" />
      <text x="498" y="214" text-anchor="middle" fill="#67e8f9" font-size="11.5">+100</text>
      <!-- row2 -->
      <rect x="236" y="240" width="300" height="40" rx="9" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.3" />
      <text x="252" y="265" fill="#67e8f9" font-size="13" font-weight="600">!clip chat commands</text>
      <rect x="462" y="249" width="64" height="22" rx="11" fill="#0a0a0a" stroke="#22d3ee" stroke-width="1" />
      <text x="494" y="264" text-anchor="middle" fill="#67e8f9" font-size="11">+25 ea</text>
      <!-- row3 -->
      <rect x="236" y="290" width="300" height="40" rx="9" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.3" />
      <text x="252" y="315" fill="#67e8f9" font-size="13" font-weight="600">chat-density bursts</text>
      <rect x="456" y="299" width="70" height="22" rx="11" fill="#0a0a0a" stroke="#22d3ee" stroke-width="1" />
      <text x="491" y="314" text-anchor="middle" fill="#67e8f9" font-size="11">≥ 4.0×</text>
      <!-- row4 -->
      <rect x="236" y="340" width="300" height="40" rx="9" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.3" />
      <text x="252" y="365" fill="#67e8f9" font-size="13" font-weight="600">transcript hype keywords</text>
      <rect x="486" y="349" width="40" height="22" rx="11" fill="#0a0a0a" stroke="#22d3ee" stroke-width="1" />
      <text x="506" y="364" text-anchor="middle" fill="#67e8f9" font-size="11">kw</text>
      <!-- row5 -->
      <rect x="236" y="390" width="300" height="40" rx="9" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.3" />
      <text x="252" y="415" fill="#67e8f9" font-size="13" font-weight="600">audio-RMS spikes</text>
      <rect x="458" y="399" width="68" height="22" rx="11" fill="#0a0a0a" stroke="#22d3ee" stroke-width="1" />
      <text x="492" y="414" text-anchor="middle" fill="#67e8f9" font-size="11">≥ μ+2σ</text>
    </g>

    <!-- converging lines to the gate -->
    <path d="M536 210 H572 V300" fill="none" stroke="#22d3ee" stroke-width="1.4" />
    <path d="M536 260 H560 V300" fill="none" stroke="#22d3ee" stroke-width="1.4" />
    <path d="M536 310 H584" fill="none" stroke="#22d3ee" stroke-width="1.4" marker-end="url(#cs-h-c)" />
    <path d="M536 360 H560 V320" fill="none" stroke="#22d3ee" stroke-width="1.4" />
    <path d="M536 410 H572 V320" fill="none" stroke="#22d3ee" stroke-width="1.4" />

    <!-- candidate gate -->
    <rect x="588" y="276" width="166" height="72" rx="12" fill="#0d1117" stroke="#67e8f9" stroke-width="1.6" />
    <text x="671" y="302" text-anchor="middle" fill="#67e8f9" font-size="12.5" font-weight="700">candidate gate</text>
    <text x="671" y="322" text-anchor="middle" fill="#cbd5e1" font-size="10.5">≤ 20 · ≥ 120 s apart</text>
    <text x="671" y="338" text-anchor="middle" fill="#64748b" font-size="10">60 s dedupe → [1, 100]</text>

    <path d="M754 312 H788" fill="none" stroke="#818cf8" stroke-width="1.8" marker-end="url(#cs-h-i)" />

    <!-- LLM adjudication -->
    <rect x="792" y="270" width="178" height="84" rx="12" fill="#0d1117" stroke="#818cf8" stroke-width="1.4" />
    <text x="881" y="298" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">LLM adjudication</text>
    <text x="881" y="319" text-anchor="middle" fill="#cbd5e1" font-size="10.5">1 cached call / candidate</text>
    <text x="881" y="338" text-anchor="middle" fill="#64748b" font-size="10">Anthropic · OpenAI · Ollama</text>

    <path d="M970 312 H1004" fill="none" stroke="#818cf8" stroke-width="1.8" marker-end="url(#cs-h-i)" />

    <!-- output -->
    <rect x="1008" y="276" width="128" height="72" rx="12" fill="#0d1117" stroke="#67e8f9" stroke-width="1.3" />
    <text x="1072" y="302" text-anchor="middle" fill="#67e8f9" font-size="12.5" font-weight="700">clips</text>
    <text x="1072" y="322" text-anchor="middle" fill="#cbd5e1" font-size="10.5">15–30 s each</text>
    <text x="1072" y="338" text-anchor="middle" fill="#64748b" font-size="10">source-aspect cut</text>
  </g>

  <!-- bounded-cost line -->
  <text x="64" y="468" fill="#475569" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">bounded cost by design — ≤ 20 prompt-cached selection calls per VOD, or <tspan fill="#67e8f9">$0/clip</tspan> running fully local on Ollama</text>

  <!-- reliability strip -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <rect x="64" y="500" width="1072" height="74" rx="14" fill="#0b0e14" stroke="#1e293b" stroke-width="1.2" />
    <g>
      <text x="208" y="534" fill="#67e8f9" font-size="24" font-weight="800">3</text>
      <text x="208" y="556" fill="#64748b" font-size="11.5">LLM providers</text>
    </g>
    <g>
      <text x="430" y="534" fill="#67e8f9" font-size="24" font-weight="800">193</text>
      <text x="430" y="556" fill="#64748b" font-size="11.5">tests · CI green</text>
    </g>
    <g>
      <text x="676" y="534" fill="#67e8f9" font-size="24" font-weight="800">v0.2.1</text>
      <text x="676" y="556" fill="#64748b" font-size="11.5">PyPI clipsmith-ai</text>
    </g>
    <g>
      <text x="940" y="534" fill="#67e8f9" font-size="24" font-weight="800">Docker</text>
      <text x="940" y="556" fill="#64748b" font-size="11.5">image published · local + Azure ACI</text>
    </g>
    <line x1="312" y1="516" x2="312" y2="560" stroke="#1e293b" stroke-width="1" />
    <line x1="544" y1="516" x2="544" y2="560" stroke="#1e293b" stroke-width="1" />
    <line x1="800" y1="516" x2="800" y2="560" stroke="#1e293b" stroke-width="1" />
  </g>
</svg>
