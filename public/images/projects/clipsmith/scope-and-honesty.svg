<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="1120" height="470" fill="#0a0a0a" />
  <text x="48" y="48" fill="#e2e8f0" font-size="20" font-weight="700">Honest scope — what's proven, and where the depth ends</text>
  <text x="48" y="74" fill="#64748b" font-size="13">An active project mid-sprint. The value is a real, tested pipeline; the boundaries are named rather than papered over.</text>

  <!-- proven panel -->
  <rect x="48" y="104" width="500" height="318" rx="12" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.3" />
  <text x="72" y="138" fill="#67e8f9" font-size="14" font-weight="700">PROVEN &amp; COMMITTED</text>
  <g font-size="12.5">
    <path d="M76 170 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="176" fill="#cbd5e1">6-stage funnel · 5 deterministic signals</text>
    <path d="M76 206 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="212" fill="#cbd5e1">193 tests · CI green (ruff/mypy/pytest/bandit)</text>
    <path d="M76 242 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="248" fill="#cbd5e1">3 LLM providers wired — incl. zero-key Ollama</text>
    <path d="M76 278 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="284" fill="#cbd5e1">FastAPI + Next.js dashboard — real &amp; tested</text>
    <path d="M76 314 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="320" fill="#cbd5e1">shipped: PyPI clipsmith-ai v0.2.1 + Docker</text>
    <path d="M76 350 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="356" fill="#cbd5e1">retry · checkpoint · --resume · failures persisted</text>
    <path d="M76 386 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="392" fill="#cbd5e1">cloud batch on ephemeral Azure ACI, built</text>
  </g>

  <!-- boundary panel -->
  <rect x="572" y="104" width="500" height="318" rx="12" fill="#0b0e14" stroke="#475569" stroke-width="1.2" />
  <text x="596" y="138" fill="#94a3b8" font-size="14" font-weight="700">WHERE THE DEPTH ENDS</text>
  <g font-size="12.5" fill="#94a3b8">
    <text x="596" y="172">→ default output is source-aspect stream-copy;</text>
    <text x="616" y="192" fill="#64748b" font-size="11">9:16 vertical + burned-in captions are opt-in (--reframe)</text>
    <text x="596" y="226">→ no throughput number is committed to the repo</text>
    <text x="616" y="246" fill="#64748b" font-size="11">the "50–65 min / VOD" doc figures are unsourced prose</text>
    <text x="596" y="280">→ e2e suite exists but has never run in CI</text>
    <text x="616" y="300" fill="#64748b" font-size="11">6 e2e tests need real creds + --run-e2e; run by hand</text>
    <text x="596" y="334">→ cloud CD is in progress (Sprint 10), uncommitted</text>
    <text x="596" y="368">→ language is auto-detect, not pinned</text>
    <text x="616" y="388" fill="#64748b" font-size="11">"Spanish" lives in the prompt + keyword list, not a setting</text>
  </g>

  <text x="560" y="456" text-anchor="middle" fill="#64748b" font-size="12">Every line on the right is verifiable from the repo — surfaced here rather than discovered in an interview.</text>
</svg>
