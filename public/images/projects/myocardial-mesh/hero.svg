<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="&#39;Geist&#39;, system-ui, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#7dd3fc" stroke-opacity="0.05" stroke-width="1"></path>
    </pattern>
    <radialGradient id="glowA" cx="264" cy="189" r="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.12"></stop>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="glowB" cx="960" cy="472" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.07"></stop>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"></stop>
    </linearGradient>
    <filter id="hotglow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDev="16" flood-color="#22d3ee" flood-opacity="0.4"></feDropShadow>
    </filter>
  </defs>

  
  <rect width="1200" height="630" fill="#0a0a0a"></rect>
  <rect width="1200" height="630" fill="url(#grid)"></rect>
  <rect width="1200" height="630" fill="url(#glowA)"></rect>
  <rect width="1200" height="630" fill="url(#glowB)"></rect>

  
  <text x="64" y="90" font-size="54" font-weight="700" letter-spacing="-1.6" fill="#ffffff">Myocardial Mesh</text>
  <text x="64" y="132" font-size="21" fill="#737373">Heart-simulation research code, refactored into a tested, reusable library.</text>
  <rect x="64" y="156" width="396" height="2" rx="1" fill="url(#rule)"></rect>

  
  <rect x="64" y="222" width="268" height="156" rx="14" fill="#ffffff" fill-opacity="0.014" stroke="#28454e" stroke-width="1.5"></rect>
  <rect x="388" y="210" width="308" height="180" rx="14" fill="#ffffff" fill-opacity="0.014" stroke="#22d3ee" stroke-width="1.5" filter="url(#hotglow)"></rect>
  <rect x="752" y="222" width="384" height="156" rx="14" fill="#ffffff" fill-opacity="0.014" stroke="#28454e" stroke-width="1.5"></rect>

  
  <text x="198" y="252" font-size="11.5" font-weight="700" letter-spacing="1.6" fill="#a3a3a3" text-anchor="middle">INPUTS</text>
  <text x="198" y="288" font-size="20" font-weight="700" letter-spacing="-0.2" fill="#ffffff" text-anchor="middle">A 3D heart model</text>
  <text x="198" y="316" font-size="14" fill="#a3a3a3" text-anchor="middle">+ its electrical “wiring”</text>
  <text x="198" y="337" font-size="14" fill="#737373" text-anchor="middle">+ sensor positions</text>

  
  <g transform="translate(341,293)" fill="none" stroke="#818cf8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="2" y1="7" x2="30" y2="7"></line>
    <path d="M24 2 L34 7 L24 12"></path>
  </g>

  
  <text x="542" y="240" font-size="11.5" font-weight="700" letter-spacing="1.6" fill="#22d3ee" text-anchor="middle">THE ENGINE</text>
  <text x="542" y="277" font-size="20" font-weight="700" letter-spacing="-0.2" fill="#22d3ee" text-anchor="middle">Simulate the</text>
  <text x="542" y="302" font-size="20" font-weight="700" letter-spacing="-0.2" fill="#22d3ee" text-anchor="middle">electrical wave</text>
  <text x="542" y="337" font-size="14" fill="#a3a3a3" text-anchor="middle">spreading through the muscle,</text>
  <text x="542" y="358" font-size="14" fill="#a3a3a3" text-anchor="middle">beat by beat until it settles</text>

  
  <g transform="translate(705,293)" fill="none" stroke="#818cf8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="2" y1="7" x2="30" y2="7"></line>
    <path d="M24 2 L34 7 L24 12"></path>
  </g>

  
  <text x="944" y="240" font-size="11.5" font-weight="700" letter-spacing="1.6" fill="#a3a3a3" text-anchor="middle">OUTPUT</text>
  <text x="944" y="278" font-size="20" font-weight="700" letter-spacing="-0.2" fill="#ffffff" text-anchor="middle">A 12-lead ECG</text>
  <g transform="translate(800,300)" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 30 L44 30 Q54 30 58 22 Q62 30 72 30 L96 30 L108 30 L116 30 L122 8 L130 40 L138 4 L146 30 L172 30 Q184 30 190 18 Q196 30 208 30 L288 30"></path>
  </g>
  <text x="944" y="364" font-size="11.5" fill="#525252" text-anchor="middle">all 12 leads · I II III aVR aVL aVF V1–V6</text>

  
  <rect x="64" y="422" width="1072" height="96" rx="14" fill="#22d3ee" fill-opacity="0.025" stroke="#22d3ee" stroke-width="1.5"></rect>
  <g transform="translate(92,446)" fill="none" stroke="#22d3ee" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="24" cy="24" r="21"></circle>
    <path d="M15 24.5 L21.5 31 L34 18"></path>
  </g>
  <text x="162" y="462" font-size="19" font-weight="700" fill="#ffffff">Reproduces the original research exactly.</text>
  <text x="162" y="489" font-size="15" fill="#737373">The refactor changed the code, not the answer, to within one-millionth, checked by an automated test.</text>

  
  <line x1="0" y1="548" x2="1200" y2="548" stroke="#262626" stroke-width="1"></line>
  <rect x="0" y="549" width="1200" height="81" fill="#ffffff" fill-opacity="0.018"></rect>
  <text x="64" y="595" font-size="16" font-weight="700" fill="#22d3ee">Parity &lt; 1e-6</text>
  <text x="332" y="595" font-size="16" font-weight="700" fill="#22d3ee">Python 3.10 &amp; 3.12</text>
  <text x="600" y="595" font-size="16" font-weight="700" fill="#22d3ee">Deterministic results</text>
  <text x="868" y="595" font-size="16" font-weight="700" fill="#22d3ee">MIT · research library</text>
</svg>