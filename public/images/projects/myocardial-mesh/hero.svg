<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <radialGradient id="mm-glow" cx="42%" cy="38%" r="78%">
      <stop offset="0%" stop-color="#0e2a2f" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </radialGradient>
    <pattern id="mm-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#16202a" stroke-width="1" />
    </pattern>
    <marker id="mm-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#818cf8" />
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#mm-glow)" />
  <rect width="1200" height="630" fill="url(#mm-grid)" />

  <!-- title -->
  <text x="64" y="96" fill="#f8fafc" font-size="48" font-weight="800" letter-spacing="-1">Myocardial Mesh</text>
  <text x="66" y="134" fill="#94a3b8" font-size="20">Heart-simulation research code, refactored into a tested, reusable library.</text>
  <rect x="66" y="152" width="392" height="3" fill="#22d3ee" opacity="0.6" />

  <!-- ===== flow ===== -->
  <!-- inputs -->
  <rect x="64" y="218" width="262" height="158" rx="14" fill="#0d1117" stroke="#334155" stroke-width="1.5" />
  <text x="195" y="256" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">INPUTS</text>
  <text x="195" y="290" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">A 3D heart model</text>
  <text x="195" y="320" text-anchor="middle" fill="#94a3b8" font-size="14">+ its electrical &#8220;wiring&#8221;</text>
  <text x="195" y="342" text-anchor="middle" fill="#94a3b8" font-size="14">+ sensor positions</text>

  <!-- engine (heart) -->
  <rect x="362" y="200" width="300" height="194" rx="16" fill="#0b1f24" stroke="#22d3ee" stroke-width="2.2" />
  <text x="512" y="240" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">THE ENGINE</text>
  <text x="512" y="274" text-anchor="middle" fill="#67e8f9" font-size="19" font-weight="700">Simulate the</text>
  <text x="512" y="300" text-anchor="middle" fill="#67e8f9" font-size="19" font-weight="700">electrical wave</text>
  <text x="512" y="336" text-anchor="middle" fill="#cbd5e1" font-size="13.5">spreading through the muscle,</text>
  <text x="512" y="356" text-anchor="middle" fill="#94a3b8" font-size="13.5">beat by beat until it settles</text>

  <!-- ecg out -->
  <rect x="698" y="218" width="300" height="158" rx="14" fill="#0d1117" stroke="#334155" stroke-width="1.5" />
  <text x="848" y="256" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">OUTPUT</text>
  <text x="848" y="286" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">A 12-lead ECG</text>
  <!-- ecg trace glyph -->
  <polyline points="722,330 760,330 770,320 780,330 798,330 806,342 814,300 822,350 830,330 852,330 862,318 874,330 974,330"
    fill="none" stroke="#67e8f9" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.9" />
  <text x="848" y="362" text-anchor="middle" fill="#64748b" font-size="11">all 12 leads · I  II  III  aVR  aVL  aVF  V1–V6</text>

  <!-- arrows -->
  <path d="M326 297 H360" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#mm-ar)" />
  <path d="M662 297 H696" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#mm-ar)" />

  <!-- parity band -->
  <rect x="64" y="416" width="934" height="86" rx="14" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.6" />
  <circle cx="112" cy="459" r="20" fill="none" stroke="#22d3ee" stroke-width="2.4" />
  <path d="M101 459 l8 8 l14 -17" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <text x="152" y="452" fill="#e2e8f0" font-size="18" font-weight="700">Reproduces the original research notebook exactly.</text>
  <text x="152" y="480" fill="#94a3b8" font-size="14.5">The refactor changed the code, not the answer — within one-millionth, checked by an automated test.</text>

  <!-- reliability strip -->
  <rect x="0" y="540" width="1200" height="90" fill="#0b0e14" />
  <line x1="0" y1="540" x2="1200" y2="540" stroke="#1e293b" stroke-width="1" />
  <g>
    <text x="64" y="586" fill="#67e8f9" font-size="16" font-weight="700">Parity &lt; 1e-6</text>
    <text x="64" y="608" fill="#64748b" font-size="13">bit-level vs the notebook</text>

    <text x="320" y="586" fill="#67e8f9" font-size="16" font-weight="700">Python 3.10 &amp; 3.12</text>
    <text x="320" y="608" fill="#64748b" font-size="13">strict types · lint · docs</text>

    <text x="620" y="586" fill="#67e8f9" font-size="16" font-weight="700">Coverage ≥ 80%</text>
    <text x="620" y="608" fill="#64748b" font-size="13">enforced on every build</text>

    <text x="900" y="586" fill="#67e8f9" font-size="16" font-weight="700">MIT · research library</text>
    <text x="900" y="608" fill="#64748b" font-size="13">v0.1.1 · not yet released</text>
  </g>
</svg>
