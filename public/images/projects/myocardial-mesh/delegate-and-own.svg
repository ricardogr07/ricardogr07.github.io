<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="450" viewBox="0 0 1120 450" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="1120" height="450" fill="#0a0a0a" />

  <text x="56" y="58" fill="#f8fafc" font-size="26" font-weight="700">Delegate the hard math, own the glue</text>
  <text x="56" y="92" fill="#94a3b8" font-size="16">The library doesn't reinvent the specialised numerics — it hands them to a proven solver and focuses on wiring it all together correctly.</text>

  <!-- delegated -->
  <rect x="56" y="132" width="488" height="240" rx="14" fill="#0d1117" stroke="#475569" stroke-width="1.4" />
  <text x="84" y="172" fill="#94a3b8" font-size="17" font-weight="700">Delegated — the heavy math</text>
  <text x="84" y="198" fill="#64748b" font-size="13.5">handed to a trusted external solver</text>
  <!-- gear glyph -->
  <g transform="translate(128,288)" stroke="#64748b" stroke-width="2" fill="#0d1117">
    <circle r="30" />
    <circle r="11" fill="#0a0a0a" />
    <g stroke="#64748b" stroke-width="6" stroke-linecap="round">
      <line x1="0" y1="-30" x2="0" y2="-42" /><line x1="0" y1="30" x2="0" y2="42" />
      <line x1="-30" y1="0" x2="-42" y2="0" /><line x1="30" y1="0" x2="42" y2="0" />
      <line x1="-21" y1="-21" x2="-30" y2="-30" /><line x1="21" y1="21" x2="30" y2="30" />
      <line x1="21" y1="-21" x2="30" y2="-30" /><line x1="-21" y1="21" x2="-30" y2="30" />
    </g>
  </g>
  <g font-size="14.5" fill="#cbd5e1">
    <text x="200" y="262">how fast the electrical wave</text>
    <text x="200" y="286">travels through the muscle</text>
    <text x="200" y="324" fill="#94a3b8" font-size="13">treated as a black box —</text>
    <text x="200" y="344" fill="#94a3b8" font-size="13">don't rewrite specialised numerics</text>
  </g>

  <!-- owned -->
  <rect x="576" y="132" width="488" height="240" rx="14" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.8" />
  <text x="604" y="172" fill="#67e8f9" font-size="17" font-weight="700">Owned — the glue &amp; the proof</text>
  <text x="604" y="198" fill="#64748b" font-size="13.5">where the real engineering went</text>
  <g font-size="14.5" fill="#cbd5e1">
    <path d="M606 222 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="638" y="229">load the heart model in and out (the I/O)</text>
    <path d="M606 258 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="638" y="265">couple the wiring to the muscle</text>
    <path d="M606 294 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="638" y="301">assemble the 12-lead ECG</text>
    <path d="M606 330 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="638" y="337">prove it matches the original (the test)</text>
  </g>

  <text x="56" y="420" fill="#64748b" font-size="14">There's also an optional fast path for the wiring search — and if its extra dependency isn't installed, it fails clearly instead of guessing.</text>
</svg>
