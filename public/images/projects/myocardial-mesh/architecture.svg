<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" font-family="&#39;Geist&#39;, system-ui, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#7dd3fc" stroke-opacity="0.05" stroke-width="1"></path>
    </pattern>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#818cf8"></path>
    </marker>
    <filter id="hotglow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDev="18" flood-color="#22d3ee" flood-opacity="0.42"></feDropShadow>
    </filter>
  </defs>

  
  <rect width="1120" height="470" fill="#0a0a0a"></rect>
  <rect width="1120" height="470" fill="url(#grid)"></rect>

  
  <text x="40" y="52" font-size="27" font-weight="700" letter-spacing="-0.54" fill="#ffffff">How Myocardial Mesh works</text>
  <text x="40" y="84" font-size="15.5" fill="#737373">You bring the heart model and its wiring; the library simulates the electrical wave and turns it into an ECG.</text>

  
  <text x="40" y="128" font-size="11" font-weight="700" letter-spacing="1.5" fill="#a3a3a3">YOU PROVIDE</text>
  <g font-size="14.5" fill="#d4d4d4">
    <rect x="40" y="144" width="232" height="44" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#262626" stroke-width="1.5"></rect>
    <text x="156" y="171" text-anchor="middle">3D heart-muscle model</text>
    <rect x="40" y="200" width="232" height="44" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#262626" stroke-width="1.5"></rect>
    <text x="156" y="227" text-anchor="middle">electrical “wiring” tree</text>
    <rect x="40" y="256" width="232" height="44" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#262626" stroke-width="1.5"></rect>
    <text x="156" y="283" text-anchor="middle">sensor positions</text>
  </g>

  
  <g transform="translate(289,212)" fill="none" stroke="#818cf8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="2" y1="7" x2="30" y2="7"></line>
    <path d="M24 2 L34 7 L24 12"></path>
  </g>

  
  <rect x="368" y="110" width="360" height="260" rx="14" fill="#22d3ee" fill-opacity="0.03" stroke="#22d3ee" stroke-width="1.5" filter="url(#hotglow)"></rect>
  <text x="548" y="140" font-size="19" font-weight="700" letter-spacing="-0.19" fill="#22d3ee" text-anchor="middle">The coupling loop</text>

  
  <g transform="translate(400.9,143.2) scale(0.86)">
    
    <g stroke="#818cf8" stroke-width="2" stroke-linecap="round" fill="none" marker-end="url(#ah)">
      <path d="M212.7 53.7 A90 90 0 0 1 241.3 82.3"></path>
      <path d="M241.3 177.7 A90 90 0 0 1 212.7 206.3"></path>
      <path d="M117.3 206.3 A90 90 0 0 1 88.7 177.7"></path>
      <path d="M88.7 82.3 A90 90 0 0 1 117.3 53.7"></path>
    </g>
    
    <g transform="translate(165,130)" stroke="#28454e" stroke-width="1.6" stroke-linecap="round" fill="none">
      <path d="M-9 -3 A9 9 0 1 1 -7.5 6"></path>
      <path d="M-12 -5 L-9 -3 L-6.5 -6.5"></path>
    </g>
    <text x="165" y="152" text-anchor="middle" font-size="11" letter-spacing="0.5" fill="#737373">repeat</text>
    
    <rect x="104" y="24" width="122" height="32" rx="9" fill="#22d3ee" fill-opacity="0.07" stroke="#22d3ee" stroke-width="1.5"></rect>
    <text x="165" y="44" text-anchor="middle" font-size="13" font-weight="600" fill="#22d3ee">fire the wiring</text>

    <rect x="183" y="107" width="144" height="46" rx="9" fill="#ffffff" fill-opacity="0.02" stroke="#22d3ee" stroke-width="1.5"></rect>
    <text x="255" y="125" text-anchor="middle" font-size="13" font-weight="500" fill="#e5e5e5">spread the wave</text>
    <text x="255" y="142" text-anchor="middle" font-size="13" font-weight="500" fill="#e5e5e5">through the muscle</text>

    <rect x="113" y="204" width="104" height="32" rx="9" fill="#ffffff" fill-opacity="0.02" stroke="#22d3ee" stroke-width="1.5"></rect>
    <text x="165" y="224" text-anchor="middle" font-size="13" font-weight="500" fill="#e5e5e5">read the ECG</text>

    <rect x="15" y="114" width="120" height="32" rx="9" fill="#ffffff" fill-opacity="0.02" stroke="#22d3ee" stroke-width="1.5"></rect>
    <text x="75" y="134" text-anchor="middle" font-size="13" font-weight="500" fill="#e5e5e5">check it settled</text>
  </g>

  
  <g transform="translate(745,212)" fill="none" stroke="#818cf8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="2" y1="7" x2="30" y2="7"></line>
    <path d="M24 2 L34 7 L24 12"></path>
  </g>

  
  <rect x="801" y="170" width="279" height="90" rx="14" fill="#ffffff" fill-opacity="0.014" stroke="#262626" stroke-width="1.5"></rect>
  <text x="940" y="200" font-size="19" font-weight="700" letter-spacing="-0.19" fill="#ffffff" text-anchor="middle">A 12-lead ECG</text>
  <g transform="translate(800,196)" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 28 L40 28 Q50 28 54 21 Q58 28 68 28 L92 28 L104 28 L112 28 L118 7 L126 38 L134 4 L142 28 L168 28 Q180 28 186 17 Q192 28 204 28 L280 28"></path>
  </g>
  <text x="940" y="246" font-size="12" letter-spacing="0.24" fill="#525252" text-anchor="middle">I · II · III · aVR · aVL · aVF · V1–V6</text>
</svg>