<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="460" viewBox="0 0 1120 460" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="cl-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#818cf8" /></marker>
  </defs>
  <rect width="1120" height="460" fill="#0a0a0a" />

  <text x="56" y="58" fill="#f8fafc" font-size="26" font-weight="700">One heartbeat, simulated step by step</text>
  <text x="56" y="92" fill="#94a3b8" font-size="16">The core is a loop: light up the wiring, let the wave spread, read the ECG, and repeat until the signal settles.</text>

  <!-- step 1 -->
  <rect x="56" y="150" width="230" height="130" rx="14" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.8" />
  <circle cx="92" cy="186" r="14" fill="#0b2a30" stroke="#22d3ee" stroke-width="1.5" />
  <text x="92" y="191" text-anchor="middle" fill="#67e8f9" font-size="14" font-weight="700">1</text>
  <text x="171" y="232" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Fire the wiring</text>
  <text x="171" y="256" text-anchor="middle" fill="#94a3b8" font-size="13">signal enters the muscle</text>

  <!-- step 2 -->
  <rect x="316" y="150" width="230" height="130" rx="14" fill="#0d1117" stroke="#334155" stroke-width="1.5" />
  <circle cx="352" cy="186" r="14" fill="#0d1117" stroke="#818cf8" stroke-width="1.5" />
  <text x="352" y="191" text-anchor="middle" fill="#a5b4fc" font-size="14" font-weight="700">2</text>
  <text x="431" y="232" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Spread the wave</text>
  <text x="431" y="256" text-anchor="middle" fill="#94a3b8" font-size="13">through the heart muscle</text>

  <!-- step 3 -->
  <rect x="576" y="150" width="230" height="130" rx="14" fill="#0d1117" stroke="#334155" stroke-width="1.5" />
  <circle cx="612" cy="186" r="14" fill="#0d1117" stroke="#818cf8" stroke-width="1.5" />
  <text x="612" y="191" text-anchor="middle" fill="#a5b4fc" font-size="14" font-weight="700">3</text>
  <text x="691" y="232" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Read the ECG</text>
  <text x="691" y="256" text-anchor="middle" fill="#94a3b8" font-size="13">from the sensors</text>

  <!-- step 4 -->
  <rect x="836" y="150" width="228" height="130" rx="14" fill="#0d1117" stroke="#334155" stroke-width="1.5" />
  <circle cx="872" cy="186" r="14" fill="#0d1117" stroke="#818cf8" stroke-width="1.5" />
  <text x="872" y="191" text-anchor="middle" fill="#a5b4fc" font-size="14" font-weight="700">4</text>
  <text x="950" y="232" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Settled?</text>
  <text x="950" y="256" text-anchor="middle" fill="#94a3b8" font-size="13">stop, or loop again</text>

  <!-- forward arrows -->
  <path d="M286 215 H314" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#cl-ar)" />
  <path d="M546 215 H574" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#cl-ar)" />
  <path d="M806 215 H834" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#cl-ar)" />

  <!-- loop-back arrow -->
  <path d="M950 280 V336 H171 V282" fill="none" stroke="#475569" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#cl-ar)" />
  <text x="560" y="328" text-anchor="middle" fill="#64748b" font-size="13">not settled yet → refine and run another beat</text>

  <text x="56" y="404" fill="#64748b" font-size="14">It can also inject an early "extra" beat (a PVC) to study how an irregular heartbeat changes the ECG.</text>
</svg>
