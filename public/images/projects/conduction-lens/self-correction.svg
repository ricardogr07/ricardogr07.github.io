<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="480" viewBox="0 0 1120 480" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="sc-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#22d3ee" />
    </marker>
  </defs>
  <rect width="1120" height="480" fill="#0a0a0a" />
  <text x="48" y="44" fill="#e2e8f0" font-size="20" font-weight="700">The methodological contribution: three errors we caught on ourselves</text>
  <text x="48" y="70" fill="#64748b" font-size="13">Each would have shipped a false headline. Calibration and confirmation experiments narrowed the claim and made it truer.</text>

  <g font-size="11">
    <text x="268" y="98" text-anchor="middle" fill="#b98a3a" font-size="11" font-weight="700">WHAT LOOKED TRUE</text>
    <text x="816" y="98" text-anchor="middle" fill="#5ba7b5" font-size="11" font-weight="700">WHAT WAS ACTUALLY TRUE</text>
  </g>

  <!-- Row 1 -->
  <rect x="48" y="112" width="440" height="86" rx="11" fill="#140f02" stroke="#f59e0b" stroke-width="1.2" />
  <text x="68" y="146" fill="#fcd34d" font-size="13" font-weight="700">Raw contraction looked great</text>
  <text x="68" y="170" fill="#b98a3a" font-size="11.5">every one of the 7 parameters looked recoverable</text>
  <path d="M488 155 H556" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#sc-ar)" />
  <rect x="560" y="112" width="512" height="86" rx="11" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.3" />
  <text x="580" y="142" fill="#67e8f9" font-size="13" font-weight="700">SBC showed the posterior was overconfident</text>
  <text x="580" y="164" fill="#cbd5e1" font-size="11.5">per-parameter conformal fixed the spread. Without it we would have</text>
  <text x="580" y="182" fill="#cbd5e1" font-size="11.5">called the diffuse block identifiable.</text>

  <!-- Row 2 -->
  <rect x="48" y="214" width="440" height="86" rx="11" fill="#140f02" stroke="#f59e0b" stroke-width="1.2" />
  <text x="68" y="248" fill="#fcd34d" font-size="13" font-weight="700">rho(delta_iv, cv_myo) = -0.72</text>
  <text x="68" y="272" fill="#b98a3a" font-size="11.5">read as a degeneracy: "the ECG can't separate them"</text>
  <path d="M488 257 H556" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#sc-ar)" />
  <rect x="560" y="214" width="512" height="86" rx="11" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.3" />
  <text x="580" y="244" fill="#67e8f9" font-size="13" font-weight="700">ridge_confirm refuted it</text>
  <text x="580" y="266" fill="#cbd5e1" font-size="11.5">a tilted-but-thin joint is still identifiable: a mild ridge, not a</text>
  <text x="580" y="284" fill="#cbd5e1" font-size="11.5">degeneracy. A correlation is not non-identifiability.</text>

  <!-- Row 3 -->
  <rect x="48" y="316" width="440" height="86" rx="11" fill="#140f02" stroke="#f59e0b" stroke-width="1.2" />
  <text x="68" y="350" fill="#fcd34d" font-size="13" font-weight="700">Measured at ~3000x SNR</text>
  <text x="68" y="374" fill="#b98a3a" font-size="11.5">73 mV forward vs a 0.025 mV floor: all looked recoverable</text>
  <path d="M488 359 H556" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#sc-ar)" />
  <rect x="560" y="316" width="512" height="86" rx="11" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.3" />
  <text x="580" y="346" fill="#67e8f9" font-size="13" font-weight="700">Rescaled the forward to physiological mV</text>
  <text x="580" y="368" fill="#cbd5e1" font-size="11.5">magnitudes loosened, but the ordering and the constraint /</text>
  <text x="580" y="386" fill="#cbd5e1" font-size="11.5">diffuse structure survived.</text>

  <!-- takeaway -->
  <line x1="48" y1="426" x2="1072" y2="426" stroke="#1e293b" stroke-width="1" />
  <text x="48" y="452" fill="#cbd5e1" font-size="12.5">Each correction narrowed the claim and made it truer. That self-correction record, backed by a public <tspan fill="#67e8f9" font-weight="700">verification ledger</tspan>,</text>
  <text x="48" y="470" fill="#cbd5e1" font-size="12.5">is the methodological contribution - as much as the numbers are.</text>
</svg>
