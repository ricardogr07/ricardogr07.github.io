<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="ep-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#818cf8" />
    </marker>
  </defs>
  <rect width="1120" height="470" fill="#0a0a0a" />
  <text x="48" y="44" fill="#e2e8f0" font-size="20" font-weight="700">Forward simulate, then amortized inference, then calibrate</text>
  <text x="48" y="70" fill="#64748b" font-size="13">Conduction parameters run through the author's own simulator to a 12-lead pseudo-ECG; an amortized neural posterior estimator inverts it, and conformal recalibration makes it honest.</text>

  <!-- 5-box pipeline, x_i = 48 + i*209, w=185, y=150 h=120 -->
  <!-- params -->
  <rect x="48" y="150" width="185" height="120" rx="12" fill="#0d1117" stroke="#22d3ee" stroke-width="1.3" />
  <text x="140" y="196" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">conduction params</text>
  <text x="140" y="220" text-anchor="middle" fill="#cbd5e1" font-size="11">7 params + tree topology</text>
  <text x="140" y="240" text-anchor="middle" fill="#64748b" font-size="10.5">fixed anatomy (crtdemo)</text>
  <path d="M233 210 H253" fill="none" stroke="#818cf8" stroke-width="1.8" marker-end="url(#ep-ar)" />

  <!-- simulator -->
  <rect x="257" y="150" width="185" height="120" rx="12" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.8" />
  <text x="349" y="192" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">forward simulator</text>
  <text x="349" y="214" text-anchor="middle" fill="#cbd5e1" font-size="11">purkinje-uv + myo-mesh</text>
  <text x="349" y="234" text-anchor="middle" fill="#cbd5e1" font-size="11">eikonal activation</text>
  <text x="349" y="254" text-anchor="middle" fill="#64748b" font-size="10.5">author's own libraries</text>
  <path d="M442 210 H462" fill="none" stroke="#818cf8" stroke-width="1.8" marker-end="url(#ep-ar)" />

  <!-- pseudo-ECG -->
  <rect x="466" y="150" width="185" height="120" rx="12" fill="#0d1117" stroke="#22d3ee" stroke-width="1.3" />
  <text x="558" y="192" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">12-lead pseudo-ECG</text>
  <text x="558" y="214" text-anchor="middle" fill="#cbd5e1" font-size="11">Gima-Rudy kernel</text>
  <text x="558" y="234" text-anchor="middle" fill="#cbd5e1" font-size="11">sigma 0.025 mV noise</text>
  <text x="558" y="254" text-anchor="middle" fill="#64748b" font-size="10.5">simulated, not measured</text>
  <path d="M651 210 H671" fill="none" stroke="#818cf8" stroke-width="1.8" marker-end="url(#ep-ar)" />

  <!-- NPE -->
  <rect x="675" y="150" width="185" height="120" rx="12" fill="#0d1117" stroke="#818cf8" stroke-width="1.3" />
  <text x="767" y="192" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">amortized NPE</text>
  <text x="767" y="214" text-anchor="middle" fill="#cbd5e1" font-size="11">sbi (PyTorch)</text>
  <text x="767" y="234" text-anchor="middle" fill="#cbd5e1" font-size="11">5000 sims, train once</text>
  <text x="767" y="254" text-anchor="middle" fill="#64748b" font-size="10.5">CPU-only, no GPU</text>
  <path d="M860 210 H880" fill="none" stroke="#818cf8" stroke-width="1.8" marker-end="url(#ep-ar)" />

  <!-- identifiability map -->
  <rect x="884" y="150" width="185" height="120" rx="12" fill="#0b1f24" stroke="#67e8f9" stroke-width="1.5" />
  <text x="976" y="192" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">calibrated posterior</text>
  <text x="976" y="214" text-anchor="middle" fill="#cbd5e1" font-size="11">+ conformal recal</text>
  <text x="976" y="234" text-anchor="middle" fill="#cbd5e1" font-size="11">identifiability map</text>
  <text x="976" y="254" text-anchor="middle" fill="#64748b" font-size="10.5">4 of 7 informative</text>

  <!-- caution strip -->
  <rect x="48" y="312" width="1021" height="52" rx="10" fill="#140f02" stroke="#f59e0b" stroke-width="1.2" />
  <text x="68" y="336" fill="#fcd34d" font-size="12.5" font-weight="700">No real ECG anywhere in the pipeline.</text>
  <text x="68" y="354" fill="#b98a3a" font-size="11.5">Every target is simulator output (inverse-crime setting). "Identifiable" means identifiable in simulation, at the stated noise floor. A real forward-vs-measured comparison is future work.</text>

  <!-- footnotes -->
  <line x1="48" y1="392" x2="1072" y2="392" stroke="#1e293b" stroke-width="1" />
  <text x="48" y="416" fill="#64748b" font-size="12">Amortized: the network trains once over the prior, then inverts any new ECG in one forward pass - no per-case optimization.</text>
  <text x="48" y="436" fill="#64748b" font-size="12">Demo is a static export on AWS S3 + CloudFront; the <tspan fill="#94a3b8">/infer</tspan> service serves real posteriors. Data: Strocchi four-chamber mesh cohort (Zenodo 3890034).</text>
</svg>
