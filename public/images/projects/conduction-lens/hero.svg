<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Geist Mono', ui-monospace, monospace">
  <defs>
    <pattern id="ep-grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0 H0 V46" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"></path>
    </pattern>
    <radialGradient id="ep-glow" cx="768" cy="264.6" r="552" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 95.5) scale(1 0.639)">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.13"></stop>
      <stop offset="0.7" stop-color="#22d3ee" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a"></rect>
  <rect width="1200" height="630" fill="url(#ep-glow)"></rect>
  <rect width="1200" height="630" fill="url(#ep-grid)"></rect>

  <text x="84" y="104" font-family="'Geist', system-ui, sans-serif" font-size="58" font-weight="700" letter-spacing="-1.5" fill="#ffffff">Conduction Lens</text>
  <text x="84" y="150" font-size="21" fill="#a3a3a3">What a 12-lead ECG can and cannot recover about the heart's wiring, with formal calibration.</text>

  <text x="84" y="216" font-size="14" fill="#737373">conduction parameters → simulated 12-lead ECG → amortized neural posterior → calibrated identifiability</text>

  <!-- identifiable / diffuse chips -->
  <g font-size="13">
    <rect x="84" y="238" width="640" height="46" rx="11" fill="#22d3ee" fill-opacity="0.07" stroke="#22d3ee" stroke-width="1.5"></rect>
    <text x="104" y="266" fill="#7dd3fc">4 identifiable: delta_iv · cv_myo · init_length_rv · cv</text>
    <rect x="736" y="238" width="380" height="46" rx="11" fill="#ffffff" fill-opacity="0.02" stroke="#525252" stroke-width="1.5"></rect>
    <text x="756" y="266" fill="#a3a3a3">3 diffuse: branch_angle · w · init_length_lv</text>
  </g>

  <!-- stage row -->
  <g text-anchor="middle">
    <g font-size="13" font-weight="700" letter-spacing="1.4" fill="#f5f5f5">
      <text x="210" y="360">SIMULATE</text>
      <text x="470" y="360">INFER</text>
      <text x="730" y="360">CALIBRATE</text>
      <text x="990" y="360">IDENTIFY</text>
    </g>
    <g fill="none" stroke-width="2">
      <circle cx="210" cy="386.9" r="6.5" stroke="#22d3ee"></circle>
      <circle cx="470" cy="386.9" r="6.5" stroke="#818cf8"></circle>
      <circle cx="730" cy="386.9" r="6.5" stroke="#818cf8"></circle>
      <circle cx="990" cy="386.9" r="6.5" stroke="#22d3ee"></circle>
    </g>
    <g font-size="12" fill="#737373">
      <text x="210" y="417">purkinje-uv + myo-mesh</text>
      <text x="470" y="417">amortized NPE (sbi)</text>
      <text x="730" y="417">conformal + SBC</text>
      <text x="990" y="417">4 of 7 params</text>
    </g>
  </g>

  <!-- stats -->
  <rect x="84" y="454.2" width="1032" height="1" fill="#262626"></rect>
  <line x1="428" y1="487" x2="428" y2="552" stroke="#262626" stroke-width="1"></line>
  <line x1="772" y1="487" x2="772" y2="552" stroke="#262626" stroke-width="1"></line>
  <g text-anchor="middle">
    <g fill="#22d3ee" font-size="40" font-weight="700" letter-spacing="-0.4">
      <text x="256" y="518">4 / 7</text>
      <text x="600" y="518">0.025 mV</text>
      <text x="944" y="518">3</text>
    </g>
    <g fill="#737373" font-size="13">
      <text x="256" y="548">conduction params identified</text>
      <text x="600" y="548">stated noise floor (sigma)</text>
      <text x="944" y="548">errors caught on ourselves</text>
    </g>
  </g>
</svg>
