<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <radialGradient id="ml-glow" cx="42%" cy="38%" r="78%">
      <stop offset="0%" stop-color="#0e2a2f" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </radialGradient>
    <pattern id="ml-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#16202a" stroke-width="1" />
    </pattern>
    <pattern id="ml-hatch" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="#140f02" />
      <line x1="0" y1="0" x2="0" y2="7" stroke="#b08436" stroke-width="1.6" opacity="0.7" />
    </pattern>
    <marker id="ml-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#818cf8" />
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#ml-glow)" />
  <rect width="1200" height="630" fill="url(#ml-grid)" />

  <!-- title -->
  <text x="64" y="96" fill="#f8fafc" font-size="50" font-weight="800" letter-spacing="-1">MarketLab</text>
  <text x="66" y="134" fill="#94a3b8" font-size="20">Reproducible market experiments — as a real package, not loose notebooks.</text>
  <rect x="66" y="152" width="392" height="3" fill="#22d3ee" opacity="0.6" />

  <!-- ===== four plain stages ===== -->
  <!-- stage 1 -->
  <rect x="64" y="224" width="200" height="150" rx="14" fill="#0d1117" stroke="#334155" stroke-width="1.5" />
  <text x="164" y="262" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">STEP 1</text>
  <text x="164" y="296" text-anchor="middle" fill="#e2e8f0" font-size="19" font-weight="700">Settings</text>
  <text x="164" y="328" text-anchor="middle" fill="#94a3b8" font-size="14">your experiment,</text>
  <text x="164" y="348" text-anchor="middle" fill="#94a3b8" font-size="14">written in one file</text>

  <!-- stage 2 -->
  <rect x="300" y="224" width="200" height="150" rx="14" fill="#0d1117" stroke="#334155" stroke-width="1.5" />
  <text x="400" y="262" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">STEP 2</text>
  <text x="400" y="296" text-anchor="middle" fill="#e2e8f0" font-size="19" font-weight="700">Market data</text>
  <text x="400" y="328" text-anchor="middle" fill="#94a3b8" font-size="14">prices turned into</text>
  <text x="400" y="348" text-anchor="middle" fill="#94a3b8" font-size="14">model-ready signals</text>

  <!-- stage 3: the heart -->
  <rect x="536" y="206" width="346" height="186" rx="16" fill="#0b1f24" stroke="#22d3ee" stroke-width="2.2" />
  <text x="709" y="244" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">STEP 3 · THE HEART</text>
  <text x="709" y="276" text-anchor="middle" fill="#67e8f9" font-size="19" font-weight="700">Fair testing</text>
  <!-- simple train | gap | test bar -->
  <rect x="566" y="298" width="170" height="26" rx="5" fill="#0b2a30" stroke="#22d3ee" stroke-width="1.2" />
  <text x="651" y="316" text-anchor="middle" fill="#67e8f9" font-size="12">learn (past)</text>
  <rect x="740" y="298" width="38" height="26" rx="5" fill="url(#ml-hatch)" stroke="#b08436" stroke-width="1.2" />
  <text x="759" y="316" text-anchor="middle" fill="#fcd34d" font-size="11">gap</text>
  <rect x="782" y="298" width="92" height="26" rx="5" fill="#141a2e" stroke="#818cf8" stroke-width="1.2" />
  <text x="828" y="316" text-anchor="middle" fill="#a5b4fc" font-size="12">test</text>
  <text x="709" y="354" text-anchor="middle" fill="#cbd5e1" font-size="13.5">scored only on data it couldn't have seen —</text>
  <text x="709" y="374" text-anchor="middle" fill="#94a3b8" font-size="13.5">no peeking at the future, proven by a test</text>

  <!-- stage 4 -->
  <rect x="918" y="224" width="218" height="150" rx="14" fill="#0d1117" stroke="#334155" stroke-width="1.5" />
  <text x="1027" y="262" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">STEP 4</text>
  <text x="1027" y="296" text-anchor="middle" fill="#e2e8f0" font-size="19" font-weight="700">Reports</text>
  <text x="1027" y="326" text-anchor="middle" fill="#94a3b8" font-size="14">plus practice-only trading</text>
  <text x="1027" y="350" text-anchor="middle" fill="#e7c38a" font-size="13">🛡 refuses real money</text>

  <!-- arrows -->
  <path d="M264 299 H298" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#ml-ar)" />
  <path d="M500 299 H534" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#ml-ar)" />
  <path d="M882 299 H916" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#ml-ar)" />

  <!-- one-line takeaway -->
  <text x="64" y="456" fill="#cbd5e1" font-size="17"><tspan fill="#22d3ee" font-weight="700">The model is the easy part.</tspan>  The real work is the machinery around it that keeps the results honest.</text>
  <text x="64" y="486" fill="#94a3b8" font-size="15">Results are re-run from the settings file, not saved as trophy numbers — so anyone can reproduce them.</text>

  <!-- reliability strip -->
  <rect x="0" y="540" width="1200" height="90" fill="#0b0e14" />
  <line x1="0" y1="540" x2="1200" y2="540" stroke="#1e293b" stroke-width="1" />
  <g>
    <text x="64" y="586" fill="#67e8f9" font-size="16" font-weight="700">PyPI 0.2.0</text>
    <text x="64" y="608" fill="#64748b" font-size="13">pip install marketlab</text>

    <text x="340" y="586" fill="#67e8f9" font-size="16" font-weight="700">678 automated tests</text>
    <text x="340" y="608" fill="#64748b" font-size="13">green on every build</text>

    <text x="660" y="586" fill="#67e8f9" font-size="16" font-weight="700">Python · Docker · AI-agent ready</text>
    <text x="660" y="608" fill="#64748b" font-size="13">command line, container, or MCP</text>
  </g>
</svg>
