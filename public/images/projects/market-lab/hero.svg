<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="&#39;Geist&#39;, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#07140f"></stop>
      <stop offset="55%" stop-color="#0a0a0a"></stop>
      <stop offset="100%" stop-color="#0a0d0c"></stop>
    </linearGradient>
    <radialGradient id="glowA" cx="360" cy="113" r="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.09"></stop>
      <stop offset="55%" stop-color="#22d3ee" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="glowB" cx="900" cy="378" r="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#105048" stop-opacity="0.34"></stop>
      <stop offset="60%" stop-color="#105048" stop-opacity="0"></stop>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 H0 V48" fill="none" stroke="#7dd3fc" stroke-opacity="0.04" stroke-width="1"></path>
    </pattern>
    <radialGradient id="gridmask" cx="720" cy="220" r="640" gradientUnits="userSpaceOnUse">
      <stop offset="30%" stop-color="#fff"></stop>
      <stop offset="85%" stop-color="#000"></stop>
    </radialGradient>
    <mask id="gm"><rect width="1200" height="630" fill="url(#gridmask)"></rect></mask>
    <pattern id="hatch" width="10" height="10" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#d4a72c" fill-opacity="0.07"></rect>
      <rect width="5" height="10" fill="#d4a72c" fill-opacity="0.18"></rect>
    </pattern>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"></stop>
    </linearGradient>
    <filter id="hot" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDev="18" flood-color="#22d3ee" flood-opacity="0.42"></feDropShadow>
    </filter>
  </defs>

  
  <rect width="1200" height="630" fill="url(#bg)"></rect>
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#gm)"></rect>
  <rect width="1200" height="630" fill="url(#glowA)"></rect>
  <rect width="1200" height="630" fill="url(#glowB)"></rect>

  
  <text x="64" y="96" font-size="60" font-weight="700" letter-spacing="-1.8" fill="#ffffff">MarketLab</text>
  <text x="64" y="135" font-size="22" fill="#737373">Reproducible market experiments, as a real package, not loose notebooks.</text>
  <rect x="64" y="156" width="396" height="2" rx="1" fill="url(#rule)"></rect>

  
  <g fill="none" stroke="#818cf8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(270,293)"><line x1="0" y1="7" x2="24" y2="7"></line><path d="M18 2 L28 7 L18 12"></path></g>
    <g transform="translate(518,293)"><line x1="0" y1="7" x2="24" y2="7"></line><path d="M18 2 L28 7 L18 12"></path></g>
    <g transform="translate(912,293)"><line x1="0" y1="7" x2="24" y2="7"></line><path d="M18 2 L28 7 L18 12"></path></g>
  </g>

  
  <rect x="64" y="230" width="198" height="140" rx="14" fill="#ffffff" fill-opacity="0.018" stroke="#262626" stroke-width="1.5"></rect>
  <text x="163" y="262" text-anchor="middle" font-size="11.5" font-weight="700" letter-spacing="1.6" fill="#a3a3a3">STEP 1</text>
  <text x="163" y="294" text-anchor="middle" font-size="23" font-weight="700" letter-spacing="-0.23" fill="#ffffff">Settings</text>
  <text x="163" y="326" text-anchor="middle" font-size="14.5" fill="#737373">your experiment,</text>
  <text x="163" y="345" text-anchor="middle" font-size="14.5" fill="#737373">written in one file</text>

  
  <rect x="312" y="230" width="198" height="140" rx="14" fill="#ffffff" fill-opacity="0.018" stroke="#262626" stroke-width="1.5"></rect>
  <text x="411" y="262" text-anchor="middle" font-size="11.5" font-weight="700" letter-spacing="1.6" fill="#a3a3a3">STEP 2</text>
  <text x="411" y="294" text-anchor="middle" font-size="23" font-weight="700" letter-spacing="-0.23" fill="#ffffff">Market data</text>
  <text x="411" y="326" text-anchor="middle" font-size="14.5" fill="#737373">prices turned into</text>
  <text x="411" y="345" text-anchor="middle" font-size="14.5" fill="#737373">model-ready signals</text>

  
  <rect x="560" y="212" width="344" height="176" rx="14" fill="#22d3ee" fill-opacity="0.03" stroke="#22d3ee" stroke-width="1.5" filter="url(#hot)"></rect>
  <text x="732" y="244" text-anchor="middle" font-size="11.5" font-weight="700" letter-spacing="1.6" fill="#22d3ee">STEP 3 · THE HEART</text>
  <text x="732" y="276" text-anchor="middle" font-size="23" font-weight="700" letter-spacing="-0.23" fill="#22d3ee">Fair testing</text>
  
  <g font-weight="600">
    <rect x="607" y="294" width="120" height="30" rx="9" fill="#22d3ee" fill-opacity="0.05" stroke="#22d3ee" stroke-width="1.5"></rect>
    <text x="667" y="314" text-anchor="middle" font-size="13.5" fill="#22d3ee">learn (past)</text>
    <rect x="735" y="294" width="44" height="30" rx="9" fill="url(#hatch)" stroke="#d4a72c" stroke-width="1.5"></rect>
    <text x="757" y="313" text-anchor="middle" font-size="12" fill="#d4a72c">gap</text>
    <rect x="787" y="294" width="70" height="30" rx="9" fill="#818cf8" fill-opacity="0.08" stroke="#818cf8" stroke-width="1.5"></rect>
    <text x="822" y="314" text-anchor="middle" font-size="13.5" fill="#a5b0f7">test</text>
  </g>
  <text x="732" y="354" text-anchor="middle" font-size="14.5" fill="#737373">scored only on data it couldn’t have seen,</text>
  <text x="732" y="373" text-anchor="middle" font-size="14.5" fill="#737373">no peeking at the future, proven by a test</text>

  
  <rect x="954" y="230" width="182" height="140" rx="14" fill="#ffffff" fill-opacity="0.018" stroke="#262626" stroke-width="1.5"></rect>
  <text x="1045" y="262" text-anchor="middle" font-size="11.5" font-weight="700" letter-spacing="1.6" fill="#a3a3a3">STEP 4</text>
  <text x="1045" y="294" text-anchor="middle" font-size="23" font-weight="700" letter-spacing="-0.23" fill="#ffffff">Reports</text>
  <text x="1045" y="332" text-anchor="middle" font-size="14.5" fill="#737373">plus practice-only trading</text>

  
  <text x="64" y="456" font-size="19" fill="#d4d4d4">
    <tspan font-weight="700" fill="#22d3ee">The model is the easy part.</tspan>
    <tspan fill="#d4d4d4"> The real work is the machinery around it that keeps the results honest.</tspan>
  </text>

  
  <line x1="0" y1="538" x2="1200" y2="538" stroke="#262626" stroke-width="1"></line>
  <rect x="0" y="539" width="1200" height="91" fill="#000000" fill-opacity="0.35"></rect>
  <g>
    <text x="64" y="582" font-size="16" font-weight="700" fill="#22d3ee">CLI · Docker · MCP</text>
    <text x="64" y="604" font-size="13.5" fill="#737373">command line, container, or AI agent</text>
  </g>
  <g>
    <text x="464" y="582" font-size="16" font-weight="700" fill="#22d3ee">Paper-trading account</text>
    <text x="464" y="604" font-size="13.5" fill="#737373">live practice runs, never real money</text>
  </g>
  <g>
    <text x="828" y="582" font-size="16" font-weight="700" fill="#22d3ee">Azure · Telegram</text>
    <text x="828" y="604" font-size="13.5" fill="#737373">deploys to the cloud, pings you on Telegram</text>
  </g>
</svg>