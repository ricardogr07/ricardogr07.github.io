<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="598" viewBox="0 0 1120 598" font-family="&#39;Geist&#39;, system-ui, sans-serif">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 H0 V44" fill="none" stroke="#7dd3fc" stroke-opacity="0.045" stroke-width="1"></path>
    </pattern>
    <pattern id="hatch" width="10" height="10" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#d4a72c" fill-opacity="0.07"></rect>
    </pattern>
    <filter id="hot" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDev="18" flood-color="#22d3ee" flood-opacity="0.45"></feDropShadow>
    </filter>
  </defs>

  
  <rect width="1120" height="598" fill="#0a0a0a"></rect>
  <rect width="1120" height="598" fill="url(#grid)"></rect>

  
  <text x="40" y="52" font-size="27" font-weight="700" letter-spacing="-0.54" fill="#ffffff">How MarketLab is built</text>
  <text x="40" y="84" font-size="15.5" fill="#737373">One settings file goes in, a fair-testing engine sits at the core, and trading is fenced to a practice account.</text>

  
  <rect x="40" y="120" width="1040" height="64" rx="14" fill="#ffffff" fill-opacity="0.018" stroke="#262626" stroke-width="1.5"></rect>
  <text x="66" y="157" font-size="12" font-weight="700" letter-spacing="1.55" fill="#a3a3a3">RUN IT YOUR WAY</text>
  <g font-size="14" fill="#d4d4d4">
    <rect x="252" y="136" width="200" height="32" rx="9" fill="#ffffff" fill-opacity="0.02" stroke="#262626" stroke-width="1.5"></rect>
    <text x="352" y="157" text-anchor="middle">command line</text>
    <rect x="466" y="136" width="206" height="32" rx="9" fill="#ffffff" fill-opacity="0.02" stroke="#262626" stroke-width="1.5"></rect>
    <text x="569" y="157" text-anchor="middle">AI assistant (MCP)</text>
    <rect x="686" y="136" width="204" height="32" rx="9" fill="#ffffff" fill-opacity="0.02" stroke="#262626" stroke-width="1.5"></rect>
    <text x="788" y="157" text-anchor="middle">Docker container</text>
  </g>

  
  <g fill="none" stroke="#818cf8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(212,276)"><line x1="2" y1="7" x2="24" y2="7"></line><path d="M18 2 L28 7 L18 12"></path></g>
    <g transform="translate(432,276)"><line x1="2" y1="7" x2="24" y2="7"></line><path d="M18 2 L28 7 L18 12"></path></g>
    <g transform="translate(684,276)"><line x1="2" y1="7" x2="24" y2="7"></line><path d="M18 2 L28 7 L18 12"></path></g>
  </g>
  
  <g transform="translate(892,276)" fill="none" stroke="#d4a72c" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <line x1="2" y1="7" x2="22" y2="7" stroke-dasharray="2 6"></line>
    <path d="M18 2 L28 7 L18 12"></path>
  </g>

  
  <g>
    <rect x="40" y="228" width="166" height="110" rx="14" fill="#ffffff" fill-opacity="0.018" stroke="#262626" stroke-width="1.5"></rect>
    <text x="123" y="263" text-anchor="middle" font-size="18" font-weight="700" letter-spacing="-0.18" fill="#ffffff">Settings</text>
    <text x="123" y="291" text-anchor="middle" font-size="13.5" fill="#737373">checked before</text>
    <text x="123" y="311" text-anchor="middle" font-size="13.5" fill="#737373">anything runs</text>

    <rect x="250" y="228" width="176" height="110" rx="14" fill="#ffffff" fill-opacity="0.018" stroke="#262626" stroke-width="1.5"></rect>
    <text x="338" y="263" text-anchor="middle" font-size="18" font-weight="700" letter-spacing="-0.18" fill="#ffffff">Prepare data</text>
    <text x="338" y="291" text-anchor="middle" font-size="13.5" fill="#737373">prices → signals</text>
    <text x="338" y="311" text-anchor="middle" font-size="13.5" fill="#737373">and targets</text>

    <rect x="722" y="228" width="164" height="110" rx="14" fill="#ffffff" fill-opacity="0.018" stroke="#262626" stroke-width="1.5"></rect>
    <text x="804" y="263" text-anchor="middle" font-size="18" font-weight="700" letter-spacing="-0.18" fill="#ffffff">Reports</text>
    <text x="804" y="291" text-anchor="middle" font-size="13.5" fill="#737373">charts &amp; risk</text>
    <text x="804" y="311" text-anchor="middle" font-size="13.5" fill="#737373">diagnostics</text>
  </g>

  
  <rect x="470" y="214" width="208" height="138" rx="14" fill="#22d3ee" fill-opacity="0.03" stroke="#22d3ee" stroke-width="1.5" filter="url(#hot)"></rect>
  <text x="574" y="249" text-anchor="middle" font-size="18" font-weight="700" letter-spacing="-0.18" fill="#22d3ee">Fair testing</text>
  <text x="574" y="277" text-anchor="middle" font-size="13.5" fill="#737373">learn on the past,</text>
  <text x="574" y="297" text-anchor="middle" font-size="13.5" fill="#737373">score on the future</text>
  <text x="574" y="327" text-anchor="middle" font-size="13" fill="#737373">the engine that keeps it honest</text>

  
  <rect x="930" y="228" width="150" height="110" rx="14" fill="#d4a72c" fill-opacity="0.04" stroke="#d4a72c" stroke-width="1.5"></rect>
  <text x="1005" y="278" text-anchor="middle" font-size="18" font-weight="700" letter-spacing="-0.18" fill="#d4a72c">Practice</text>
  <text x="1005" y="300" text-anchor="middle" font-size="18" font-weight="700" letter-spacing="-0.18" fill="#d4a72c">trading</text>

  
  <rect x="40" y="380" width="1040" height="138" rx="14" fill="#ffffff" fill-opacity="0.014" stroke="#262626" stroke-width="1.5"></rect>
  <g font-size="15" fill="#a3a3a3">
    <text x="68" y="425" fill="#525252">→</text>
    <text x="90" y="425">A research tool, not a money-maker: it never claims to beat the market.</text>
    <text x="68" y="459" fill="#525252">→</text>
    <text x="90" y="459">Results are re-run from the settings file, not saved as numbers you have to trust.</text>
    <text x="68" y="493" fill="#525252">→</text>
    <text x="90" y="493">Trading is locked to a practice account; two large files are flagged for future tidy-up.</text>
  </g>
</svg>