<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#818cf8" />
    </marker>
  </defs>
  <rect width="1120" height="430" fill="#0a0a0a" />
  <text x="48" y="48" fill="#e2e8f0" font-size="20" font-weight="700">Bilingual by construction — one call, two renders</text>
  <text x="48" y="74" fill="#64748b" font-size="13">Aggregate metrics only (never row-level) · one schema-locked response · no translation pass to drift</text>

  <!-- metrics -->
  <g>
    <rect x="48" y="170" width="140" height="96" rx="9" fill="#0d1117" stroke="#475569" stroke-width="1.3" />
    <text x="118" y="212" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="700">aggregate</text>
    <text x="118" y="232" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="700">metrics</text>
  </g>
  <line x1="188" y1="218" x2="232" y2="218" stroke="#818cf8" stroke-width="1.6" marker-end="url(#a)" />

  <!-- single OpenAI call with strict schema -->
  <g>
    <rect x="236" y="142" width="246" height="152" rx="12" fill="#0b0e14" stroke="#22d3ee" stroke-width="1.4" />
    <text x="359" y="170" text-anchor="middle" fill="#67e8f9" font-size="13.5" font-weight="700">1 OpenAI call</text>
    <text x="359" y="190" text-anchor="middle" fill="#64748b" font-size="10.5">Responses API · strict JSON schema</text>
    <g font-size="11.5">
      <rect x="258" y="204" width="202" height="34" rx="6" fill="#0d1117" stroke="#334155" />
      <text x="272" y="225" fill="#a5b4fc">en:</text>
      <text x="446" y="225" text-anchor="end" fill="#64748b" font-size="10">headline + 3</text>
      <rect x="258" y="244" width="202" height="34" rx="6" fill="#0d1117" stroke="#334155" />
      <text x="272" y="265" fill="#a5b4fc">es:</text>
      <text x="446" y="265" text-anchor="end" fill="#64748b" font-size="10">headline + 3</text>
    </g>
  </g>

  <!-- two render passes -->
  <line x1="482" y1="221" x2="540" y2="180" stroke="#818cf8" stroke-width="1.6" marker-end="url(#a)" />
  <line x1="482" y1="221" x2="540" y2="262" stroke="#818cf8" stroke-width="1.6" marker-end="url(#a)" />

  <!-- EN card -->
  <g>
    <rect x="548" y="120" width="240" height="120" rx="10" fill="#0d1117" stroke="#22d3ee" stroke-width="1.3" />
    <text x="568" y="148" fill="#67e8f9" font-size="13" font-weight="700">report.en</text>
    <text x="768" y="148" text-anchor="end" fill="#64748b" font-size="10">.md / .html</text>
    <rect x="568" y="162" width="200" height="10" rx="5" fill="#22d3ee" opacity="0.85" />
    <rect x="568" y="182" width="160" height="8" rx="4" fill="#334155" />
    <rect x="568" y="198" width="180" height="8" rx="4" fill="#334155" />
    <rect x="568" y="214" width="140" height="8" rx="4" fill="#334155" />
  </g>
  <!-- ES card -->
  <g>
    <rect x="548" y="252" width="240" height="120" rx="10" fill="#0d1117" stroke="#22d3ee" stroke-width="1.3" />
    <text x="568" y="280" fill="#67e8f9" font-size="13" font-weight="700">report.es</text>
    <text x="768" y="280" text-anchor="end" fill="#64748b" font-size="10">.md / .html</text>
    <rect x="568" y="294" width="200" height="10" rx="5" fill="#22d3ee" opacity="0.85" />
    <rect x="568" y="314" width="160" height="8" rx="4" fill="#334155" />
    <rect x="568" y="330" width="180" height="8" rx="4" fill="#334155" />
    <rect x="568" y="346" width="140" height="8" rx="4" fill="#334155" />
  </g>

  <!-- in-sync brace note -->
  <g>
    <path d="M812 150 q14 0 14 16 v60 q0 16 14 16 q-14 0 -14 16 v60 q0 16 -14 16" fill="none" stroke="#334155" stroke-width="1.3" />
    <text x="858" y="240" fill="#94a3b8" font-size="12.5" font-weight="700">same object</text>
    <text x="858" y="260" fill="#64748b" font-size="11.5">cannot drift</text>
  </g>

  <text x="560" y="404" text-anchor="middle" fill="#64748b" font-size="12.5">If the schema demands both languages in one response, the EN and ES reports are in sync by construction — not by a second translation step.</text>
</svg>
