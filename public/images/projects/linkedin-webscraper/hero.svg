<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Geist, system-ui, sans-serif">
  <defs>
    
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 H0 V48" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"></path>
    </pattern>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(912 265) scale(430 300)">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.12"></stop>
      <stop offset="0.7" stop-color="#22d3ee" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
