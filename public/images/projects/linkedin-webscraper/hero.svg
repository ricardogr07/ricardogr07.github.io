<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="ui-sans-serif, system-ui, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="ci" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" />
      <stop offset="1" stop-color="#818cf8" />
    </linearGradient>
    <radialGradient id="glow" cx="82%" cy="22%" r="65%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.12" />
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 H0 V48" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
    </pattern>
    <marker id="ac" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#818cf8" />
    </marker>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- ===== Left: title block ===== -->
  <text x="80" y="238" fill="#f8fafc" font-size="58" font-weight="700" letter-spacing="-1">LinkedIn Job Scraping</text>
  <text x="80" y="306" fill="#f8fafc" font-size="58" font-weight="700" letter-spacing="-1">&amp; Data Export Pipeline</text>
  <rect x="82" y="338" width="132" height="4" rx="2" fill="url(#ci)" />
  <text x="82" y="384" fill="#22d3ee" font-size="23" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Nightly · self-healing · token-disciplined</text>

  <!-- tech chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">
    <rect x="80" y="540" width="150" height="36" rx="18" fill="#0d1117" stroke="#334155" stroke-width="1.2" />
    <text x="155" y="563" text-anchor="middle" fill="#cbd5e1">Python ≥ 3.11</text>
    <rect x="244" y="540" width="160" height="36" rx="18" fill="#0d1117" stroke="#334155" stroke-width="1.2" />
    <text x="324" y="563" text-anchor="middle" fill="#cbd5e1">SQLAlchemy 2.x</text>
    <rect x="418" y="540" width="158" height="36" rx="18" fill="#0d1117" stroke="#334155" stroke-width="1.2" />
    <text x="497" y="563" text-anchor="middle" fill="#cbd5e1">GitHub Actions</text>
    <rect x="590" y="540" width="140" height="36" rx="18" fill="#0d1117" stroke="#22d3ee" stroke-width="1.2" />
    <text x="660" y="563" text-anchor="middle" fill="#67e8f9">PyPI v1.1.1</text>
  </g>

  <!-- ===== Right: chaos -> funnel -> structured, on a schedule ===== -->
  <!-- nightly clock badge -->
  <circle cx="905" cy="120" r="20" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <line x1="905" y1="120" x2="905" y2="108" stroke="#22d3ee" stroke-width="1.6" stroke-linecap="round" />
  <line x1="905" y1="120" x2="914" y2="124" stroke="#22d3ee" stroke-width="1.6" stroke-linecap="round" />
  <text x="935" y="125" fill="#64748b" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">30 12 * * *</text>

  <!-- messy listing cards feeding in -->
  <g stroke-width="1.4" fill="#0d1117">
    <rect x="772" y="150" width="44" height="28" rx="4" stroke="#818cf8" transform="rotate(-11 794 164)" />
    <rect x="836" y="158" width="44" height="28" rx="4" stroke="#22d3ee" transform="rotate(7 858 172)" />
    <rect x="902" y="150" width="44" height="28" rx="4" stroke="#818cf8" transform="rotate(-6 924 164)" />
    <rect x="968" y="160" width="44" height="28" rx="4" stroke="#22d3ee" transform="rotate(13 990 174)" />
    <rect x="1034" y="152" width="44" height="28" rx="4" stroke="#818cf8" transform="rotate(-9 1056 166)" />
  </g>

  <!-- funnel -->
  <polygon points="800,210 1060,210 968,322 892,322" fill="#22d3ee" fill-opacity="0.06" stroke="#22d3ee" stroke-width="1.6" />
  <line x1="930" y1="322" x2="930" y2="352" stroke="#818cf8" stroke-width="1.6" marker-end="url(#ac)" />

  <!-- structured output: clean rows + db cylinder -->
  <g>
    <rect x="792" y="372" width="170" height="14" rx="3" fill="#22d3ee" opacity="0.9" />
    <rect x="792" y="394" width="170" height="14" rx="3" fill="#22d3ee" opacity="0.7" />
    <rect x="792" y="416" width="170" height="14" rx="3" fill="#22d3ee" opacity="0.5" />
    <rect x="792" y="438" width="170" height="14" rx="3" fill="#22d3ee" opacity="0.35" />
  </g>

  <!-- database cylinder -->
  <g stroke="#22d3ee" stroke-width="1.6" fill="#0d1117">
    <ellipse cx="1050" cy="376" rx="42" ry="12" />
    <path d="M1008 376 V436 A42 12 0 0 0 1092 436 V376" fill="#0d1117" />
    <ellipse cx="1050" cy="376" rx="42" ry="12" fill="#0d1117" />
    <path d="M1008 406 A42 12 0 0 0 1092 406" fill="none" stroke="#22d3ee" stroke-opacity="0.5" />
  </g>
  <line x1="966" y1="406" x2="1004" y2="406" stroke="#818cf8" stroke-width="1.6" marker-end="url(#ac)" />
  <text x="1050" y="470" text-anchor="middle" fill="#64748b" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">SQLite</text>
</svg>
