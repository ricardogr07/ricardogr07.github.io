<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <defs>
    <marker id="ai" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#818cf8" />
    </marker>
    <marker id="ac" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#22d3ee" />
    </marker>
  </defs>

  <text x="40" y="40" fill="#e2e8f0" font-size="18" font-weight="600">Typed retry policy</text>
  <text x="40" y="60" fill="#64748b" font-size="12">transient chaos vs. permanent failure — not "retry until 200"</text>

  <!-- entry -->
  <rect x="40" y="170" width="150" height="56" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <text x="115" y="194" text-anchor="middle" fill="#e2e8f0" font-size="13">Network</text>
  <text x="115" y="211" text-anchor="middle" fill="#e2e8f0" font-size="13">response</text>

  <!-- ===== retryable (top) branch ===== -->
  <path d="M190 184 C 210 120, 212 105, 232 105" fill="none" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ai)" />

  <rect x="232" y="80" width="128" height="50" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <text x="296" y="103" text-anchor="middle" fill="#e2e8f0" font-size="12">Status</text>
  <text x="296" y="118" text-anchor="middle" fill="#94a3b8" font-size="11">429 / 5xx</text>

  <line x1="360" y1="105" x2="392" y2="105" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ai)" />

  <!-- decision diamond -->
  <polygon points="450,68 500,105 450,142 400,105" fill="#0d1117" stroke="#818cf8" stroke-width="1.5" />
  <text x="450" y="102" text-anchor="middle" fill="#e2e8f0" font-size="11">retryable</text>
  <text x="450" y="116" text-anchor="middle" fill="#e2e8f0" font-size="11">set?</text>
  <text x="450" y="162" text-anchor="middle" fill="#475569" font-size="9">{429,500,502,503,504}</text>

  <line x1="500" y1="105" x2="540" y2="105" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ai)" />
  <text x="520" y="97" text-anchor="middle" fill="#22d3ee" font-size="10">yes</text>

  <rect x="540" y="80" width="120" height="50" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <text x="600" y="103" text-anchor="middle" fill="#e2e8f0" font-size="12">budget</text>
  <text x="600" y="118" text-anchor="middle" fill="#94a3b8" font-size="11">max 5</text>

  <line x1="660" y1="105" x2="692" y2="105" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ai)" />

  <rect x="692" y="80" width="130" height="50" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <text x="757" y="103" text-anchor="middle" fill="#e2e8f0" font-size="12">backoff</text>
  <text x="757" y="118" text-anchor="middle" fill="#94a3b8" font-size="11">1s → 60s cap</text>

  <line x1="822" y1="105" x2="854" y2="105" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ai)" />

  <rect x="854" y="80" width="120" height="50" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <text x="914" y="103" text-anchor="middle" fill="#e2e8f0" font-size="12">UA rotate</text>
  <text x="914" y="118" text-anchor="middle" fill="#94a3b8" font-size="11">pool of 5</text>

  <line x1="974" y1="105" x2="1006" y2="105" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ac)" />
  <rect x="1006" y="80" width="90" height="50" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <text x="1051" y="109" text-anchor="middle" fill="#e2e8f0" font-size="12">retry</text>

  <!-- ===== non-retryable (bottom) branch ===== -->
  <path d="M190 212 C 210 280, 212 300, 232 300" fill="none" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ai)" />

  <rect x="232" y="275" width="128" height="50" rx="7" fill="#0d1117" stroke="#475569" stroke-width="1.5" />
  <text x="296" y="298" text-anchor="middle" fill="#cbd5e1" font-size="12">Status</text>
  <text x="296" y="313" text-anchor="middle" fill="#94a3b8" font-size="11">404 / 4xx</text>

  <line x1="360" y1="300" x2="392" y2="300" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ai)" />
  <text x="376" y="292" text-anchor="middle" fill="#64748b" font-size="10">no</text>

  <rect x="392" y="275" width="170" height="50" rx="7" fill="#0d1117" stroke="#475569" stroke-width="1.5" />
  <text x="477" y="298" text-anchor="middle" fill="#cbd5e1" font-size="12">return None</text>
  <text x="477" y="313" text-anchor="middle" fill="#94a3b8" font-size="11">saves the retry budget</text>

  <!-- discipline note -->
  <rect x="620" y="250" width="476" height="96" rx="9" fill="#0b0e14" stroke="#334155" stroke-width="1.5" />
  <text x="640" y="280" fill="#94a3b8" font-size="13" font-weight="600">Frozen HttpRequestPolicy</text>
  <text x="640" y="304" fill="#cbd5e1" font-size="12">10s timeout · explicit retryable set · strict backoff ceiling</text>
  <text x="640" y="324" fill="#cbd5e1" font-size="12">injectable session + clock → unit-testable with zero real waits</text>
</svg>
