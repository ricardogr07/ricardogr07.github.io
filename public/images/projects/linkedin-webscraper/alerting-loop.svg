<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <defs>
    <marker id="ai" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#818cf8" />
    </marker>
    <marker id="aa" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>

  <text x="40" y="40" fill="#e2e8f0" font-size="18" font-weight="600">The alerting loop</text>
  <text x="40" y="60" fill="#64748b" font-size="12">graceful failure that self-reports — and self-heals</text>

  <!-- nodes -->
  <rect x="60" y="90" width="170" height="54" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <circle cx="78" cy="108" r="11" fill="#22d3ee" /><text x="78" y="112" text-anchor="middle" fill="#0a0a0a" font-size="12" font-weight="700">1</text>
  <text x="150" y="123" text-anchor="middle" fill="#e2e8f0" font-size="13">CRON trigger</text>

  <rect x="380" y="90" width="190" height="54" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <circle cx="398" cy="108" r="11" fill="#22d3ee" /><text x="398" y="112" text-anchor="middle" fill="#0a0a0a" font-size="12" font-weight="700">2</text>
  <text x="480" y="123" text-anchor="middle" fill="#e2e8f0" font-size="13">Scrape execution</text>

  <rect x="380" y="300" width="190" height="54" rx="7" fill="#1a1206" stroke="#f59e0b" stroke-width="1.5" />
  <circle cx="398" cy="318" r="11" fill="#f59e0b" /><text x="398" y="322" text-anchor="middle" fill="#0a0a0a" font-size="12" font-weight="700">3</text>
  <text x="482" y="324" text-anchor="middle" fill="#fcd34d" font-size="13">Empty DataFrame ⚠</text>

  <rect x="60" y="300" width="190" height="54" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <circle cx="78" cy="318" r="11" fill="#22d3ee" /><text x="78" y="322" text-anchor="middle" fill="#0a0a0a" font-size="12" font-weight="700">4</text>
  <text x="160" y="324" text-anchor="middle" fill="#e2e8f0" font-size="13">Exits safely ✓</text>

  <rect x="60" y="195" width="190" height="54" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <circle cx="78" cy="213" r="11" fill="#22d3ee" /><text x="78" y="217" text-anchor="middle" fill="#0a0a0a" font-size="12" font-weight="700">5</text>
  <text x="155" y="219" text-anchor="middle" fill="#e2e8f0" font-size="12">Auto-files GH issue</text>

  <!-- loop arrows -->
  <line x1="230" y1="117" x2="376" y2="117" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ai)" />
  <line x1="475" y1="144" x2="475" y2="296" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ai)" />
  <line x1="380" y1="327" x2="254" y2="327" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#aa)" />
  <line x1="155" y1="300" x2="155" y2="253" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#aa)" />
  <line x1="155" y1="195" x2="155" y2="148" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ai)" />

  <!-- production edge-case note -->
  <rect x="640" y="120" width="450" height="190" rx="9" fill="#0b0e14" stroke="#334155" stroke-width="1.5" />
  <text x="664" y="152" fill="#94a3b8" font-size="13" font-weight="600">Production edge case</text>
  <text x="664" y="182" fill="#cbd5e1" font-size="12">Commit 296be20 fixed an empty-DataFrame crash</text>
  <text x="664" y="200" fill="#cbd5e1" font-size="12">caused by a completely empty scrape day.</text>
  <text x="664" y="234" fill="#cbd5e1" font-size="12">Now the pipeline exits gracefully, the CI wrapper</text>
  <text x="664" y="252" fill="#cbd5e1" font-size="12">files a GitHub issue for human review —</text>
  <text x="664" y="270" fill="#cbd5e1" font-size="12">and auto-closes it on recovery.</text>
  <text x="664" y="296" fill="#64748b" font-size="11">empty results need the same rigor as the happy path.</text>
</svg>
