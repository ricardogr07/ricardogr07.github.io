<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 270">
  <rect width="900" height="270" fill="#0a0a0a"/>

  <text x="450" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" fill="#f8fafc">Work scheme split</text>
  <text x="450" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#737373">285 postings · Mexico</text>

  <!-- Axes -->
  <line x1="200" y1="62" x2="200" y2="208" stroke="#262626" stroke-width="1"/>
  <line x1="200" y1="208" x2="860" y2="208" stroke="#262626" stroke-width="1"/>

  <!-- Grid lines at 50, 100 jobs (scale: 660/116 = 5.69 px/job) -->
  <line x1="485" y1="62" x2="485" y2="208" stroke="#1c1c1c" stroke-width="1"/>
  <line x1="769" y1="62" x2="769" y2="208" stroke="#1c1c1c" stroke-width="1"/>

  <!-- X-axis ticks -->
  <text x="200" y="223" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#525252">0</text>
  <text x="485" y="223" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#525252">50</text>
  <text x="769" y="223" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#525252">100</text>
  <text x="860" y="223" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#525252">116</text>

  <text x="530" y="250" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#525252">job postings</text>

  <!-- On-site: 116 → 660px (41%) -->
  <text x="192" y="84" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e2e8f0">On-site</text>
  <rect x="200" y="62" width="660" height="32" rx="3" fill="#22d3ee"/>
  <text x="870" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#22d3ee">41%</text>

  <!-- Hybrid: 86 → 489px (30%) -->
  <text x="192" y="132" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e2e8f0">Hybrid</text>
  <rect x="200" y="110" width="489" height="32" rx="3" fill="#818cf8"/>
  <text x="699" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#818cf8">30%</text>

  <!-- Remote: 83 → 472px (29%) -->
  <text x="192" y="180" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e2e8f0">Remote</text>
  <rect x="200" y="158" width="472" height="32" rx="3" fill="#f59e0b"/>
  <text x="682" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f59e0b">29%</text>
</svg>
