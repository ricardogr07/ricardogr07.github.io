  <rect x="200" y="292" width="195" height="32" rx="3" fill="#22d3ee" fill-opacity="0.22"/>
  <text x="405" y="314" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#737373">68</text>

  <!-- Data Analysis: 65 → 187px -->
