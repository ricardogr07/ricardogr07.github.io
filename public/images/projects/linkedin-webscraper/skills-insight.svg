  <rect x="200" y="338" width="187" height="32" rx="3" fill="#22d3ee" fill-opacity="0.18"/>
  <text x="397" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#737373">65</text>
</svg>
