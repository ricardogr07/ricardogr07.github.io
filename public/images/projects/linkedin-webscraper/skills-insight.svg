  <rect x="200" y="246" width="287" height="32" rx="3" fill="#22d3ee" fill-opacity="0.30"/>
  <text x="497" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#737373">100</text>

  <!-- Data Visualization: 68 → 195px -->
