<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <rect width="900" height="450" fill="#0a0a0a"/>

  <text x="450" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" fill="#f8fafc">Top skills in data science postings</text>
  <text x="450" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#737373">Mexico · 285 deduplicated listings</text>

  <!-- Axes -->
  <line x1="200" y1="62" x2="200" y2="388" stroke="#262626" stroke-width="1"/>
  <line x1="200" y1="388" x2="860" y2="388" stroke="#262626" stroke-width="1"/>

  <!-- Grid lines at 50, 100, 150, 200 jobs -->
  <line x1="344" y1="62" x2="344" y2="388" stroke="#1c1c1c" stroke-width="1"/>
  <line x1="487" y1="62" x2="487" y2="388" stroke="#1c1c1c" stroke-width="1"/>
  <line x1="630" y1="62" x2="630" y2="388" stroke="#1c1c1c" stroke-width="1"/>
  <line x1="774" y1="62" x2="774" y2="388" stroke="#1c1c1c" stroke-width="1"/>

  <!-- X-axis tick labels -->
  <text x="200" y="403" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#525252">0</text>
  <text x="344" y="403" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#525252">50</text>
  <text x="487" y="403" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#525252">100</text>
  <text x="630" y="403" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#525252">150</text>
  <text x="774" y="403" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#525252">200</text>
  <text x="860" y="403" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#525252">230</text>

  <text x="530" y="428" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#525252">job postings mentioning skill</text>

  <!-- Python: 230 → 660px -->
  <text x="192" y="84" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e2e8f0">Python</text>
  <rect x="200" y="62" width="660" height="32" rx="3" fill="#22d3ee"/>
  <text x="870" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#22d3ee">230</text>

  <!-- Database Management: 205 → 588px -->
  <text x="192" y="130" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e2e8f0">Database Management</text>
  <rect x="200" y="108" width="588" height="32" rx="3" fill="#22d3ee" fill-opacity="0.75"/>
  <text x="798" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#737373">205</text>

  <!-- Cloud Platforms: 170 → 488px -->
  <text x="192" y="176" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e2e8f0">Cloud Platforms</text>
  <rect x="200" y="154" width="488" height="32" rx="3" fill="#22d3ee" fill-opacity="0.57"/>
  <text x="698" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#737373">170</text>

  <!-- Big Data Tools: 125 → 359px -->
  <text x="192" y="222" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e2e8f0">Big Data Tools</text>
  <rect x="200" y="200" width="359" height="32" rx="3" fill="#22d3ee" fill-opacity="0.42"/>
  <text x="569" y="222" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#737373">125</text>

  <!-- Machine Learning: 100 → 287px -->
