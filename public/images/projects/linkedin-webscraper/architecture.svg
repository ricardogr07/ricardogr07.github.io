  <rect x="910" y="168" width="180" height="58" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <text x="1000" y="192" text-anchor="middle" fill="#e2e8f0" font-size="13">SQLite store</text>
  <text x="1000" y="210" text-anchor="middle" fill="#94a3b8" font-size="11">SQLAlchemy 2.x</text>

  <rect x="910" y="250" width="180" height="44" rx="7" fill="#0d1117" stroke="#475569" stroke-width="1.5" />
  <text x="1000" y="277" text-anchor="middle" fill="#cbd5e1" font-size="12">CSV exports (dated)</text>

  <line x1="1000" y1="226" x2="1000" y2="248" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ai)" />

  <!-- ===== Optional OpenAI enrichment (dashed branch) ===== -->
  <text x="975" y="34" text-anchor="middle" fill="#64748b" font-size="10" letter-spacing="1.5">OPTIONAL ENRICHMENT</text>
  <rect x="865" y="42" width="220" height="56" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6 4" />
  <text x="975" y="68" text-anchor="middle" fill="#e2e8f0" font-size="13">OpenAIHandler</text>
  <text x="975" y="86" text-anchor="middle" fill="#94a3b8" font-size="11">(gpt-4o-mini)</text>

  <path d="M775 172 C 775 130, 820 70, 863 70" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#ac)" />
  <path d="M975 98 C 975 130, 1000 140, 1000 166" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#ac)" />

  <!-- footer note -->
  <text x="40" y="360" fill="#475569" font-size="11">guest endpoints · UA rotation + typed retry policy · graceful degradation (missing fields → "N/A")</text>
</svg>
