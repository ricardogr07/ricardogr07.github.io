<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <defs>
    <marker id="ai" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#818cf8" />
    </marker>
    <marker id="ac" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#22d3ee" />
    </marker>
  </defs>

  <!-- ===== Volatile adapters (entry points) ===== -->
  <text x="115" y="56" text-anchor="middle" fill="#64748b" font-size="11" letter-spacing="1.5">VOLATILE ADAPTERS</text>

  <rect x="40" y="80" width="150" height="46" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <text x="115" y="108" text-anchor="middle" fill="#e2e8f0" font-size="13">CLI [argparse]</text>

  <rect x="40" y="160" width="150" height="46" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <text x="115" y="188" text-anchor="middle" fill="#e2e8f0" font-size="13">Library API</text>

  <rect x="40" y="240" width="150" height="46" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <text x="115" y="263" text-anchor="middle" fill="#e2e8f0" font-size="12">CRON</text>
  <text x="115" y="278" text-anchor="middle" fill="#94a3b8" font-size="11">30 12 * * *</text>

  <!-- converge onto a bus, then into the service -->
  <line x1="190" y1="103" x2="300" y2="103" stroke="#818cf8" stroke-width="1.5" />
  <line x1="190" y1="183" x2="300" y2="183" stroke="#818cf8" stroke-width="1.5" />
  <line x1="190" y1="263" x2="300" y2="263" stroke="#818cf8" stroke-width="1.5" />
  <line x1="300" y1="103" x2="300" y2="263" stroke="#818cf8" stroke-width="1.5" />
  <line x1="300" y1="195" x2="358" y2="195" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ai)" />

  <!-- ===== DailyScrapeService (isolated domain logic) ===== -->
  <rect x="340" y="90" width="520" height="190" rx="11" fill="#0b0e14" stroke="#334155" stroke-width="1.5" />
  <text x="600" y="118" text-anchor="middle" fill="#94a3b8" font-size="16" font-weight="600">DailyScrapeService</text>
  <text x="600" y="136" text-anchor="middle" fill="#475569" font-size="11" letter-spacing="0.5">isolated domain logic</text>

  <rect x="360" y="172" width="150" height="50" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <text x="435" y="202" text-anchor="middle" fill="#e2e8f0" font-size="13">JobScraper</text>

  <rect x="540" y="172" width="150" height="50" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <text x="615" y="202" text-anchor="middle" fill="#e2e8f0" font-size="12">JobDataCleaner</text>

  <rect x="700" y="172" width="150" height="50" rx="7" fill="#0d1117" stroke="#22d3ee" stroke-width="1.5" />
  <text x="775" y="199" text-anchor="middle" fill="#e2e8f0" font-size="11">JobTitleClassifier</text>
  <text x="775" y="213" text-anchor="middle" fill="#475569" font-size="9">conditional</text>

  <line x1="510" y1="197" x2="540" y2="197" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ac)" />
  <line x1="690" y1="197" x2="700" y2="197" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ac)" />

