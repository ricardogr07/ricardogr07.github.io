<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="440" viewBox="0 0 1120 440" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <text x="40" y="40" fill="#e2e8f0" font-size="18" font-weight="600">Scale: verified vs. local</text>
  <text x="40" y="60" fill="#64748b" font-size="12">what the committed history proves — and what it doesn't</text>

  <!-- ===== Left: verified CI scale ===== -->
  <rect x="40" y="84" width="490" height="320" rx="9" fill="#0b0e14" stroke="#22d3ee" stroke-width="1.5" />
  <text x="64" y="116" fill="#22d3ee" font-size="14" font-weight="600">Verified CI scale</text>
  <text x="64" y="136" fill="#64748b" font-size="11">committed data branch</text>

  <!-- 8 bars -->
  <rect x="64" y="156" width="300" height="16" rx="3" fill="#22d3ee" opacity="0.92" />
  <rect x="64" y="178" width="300" height="16" rx="3" fill="#22d3ee" opacity="0.85" />
  <rect x="64" y="200" width="300" height="16" rx="3" fill="#22d3ee" opacity="0.78" />
  <rect x="64" y="222" width="300" height="16" rx="3" fill="#22d3ee" opacity="0.71" />
  <rect x="64" y="244" width="300" height="16" rx="3" fill="#22d3ee" opacity="0.64" />
  <rect x="64" y="266" width="300" height="16" rx="3" fill="#22d3ee" opacity="0.57" />
  <rect x="64" y="288" width="300" height="16" rx="3" fill="#22d3ee" opacity="0.50" />
  <rect x="64" y="310" width="300" height="16" rx="3" fill="#22d3ee" opacity="0.43" />
  <text x="380" y="168" fill="#94a3b8" font-size="11">run 1</text>
  <text x="380" y="322" fill="#94a3b8" font-size="11">run 8</text>

  <text x="64" y="356" fill="#e2e8f0" font-size="13" font-weight="600">8 consecutive successful scheduled runs</text>
  <text x="64" y="380" fill="#94a3b8" font-size="12">~42 rows/day · filter time_posted = "DAY"</text>

  <!-- ===== Right: local backfill (untracked) ===== -->
  <rect x="560" y="84" width="520" height="320" rx="9" fill="#1a1206" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="8 5" />
  <text x="584" y="116" fill="#f59e0b" font-size="14" font-weight="600">Local backfill scale</text>
  <text x="584" y="136" fill="#fcd34d" font-size="11" letter-spacing="1">[ UNTRACKED — LOCAL RUN SAMPLE ]</text>

  <!-- funnel -->
  <polygon points="640,168 1000,168 880,300 760,300" fill="#22d3ee" fill-opacity="0.08" stroke="#22d3ee" stroke-width="1.5" />
  <text x="820" y="196" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">up to 2,280</text>
  <text x="820" y="214" text-anchor="middle" fill="#94a3b8" font-size="11">jobs scraped / variant</text>
  <line x1="820" y1="300" x2="820" y2="324" stroke="#818cf8" stroke-width="1.5" />
  <text x="820" y="344" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">146 persisted</text>
  <text x="820" y="362" text-anchor="middle" fill="#94a3b8" font-size="11">after dedup · ~47 min · 3 cities × 3 remote types · incl. OpenAI</text>
  <text x="820" y="388" text-anchor="middle" fill="#64748b" font-size="11">no proxy rotation → sustained high-volume has architectural limits</text>
</svg>
