<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="1120" height="540" fill="#0a0a0a" />
  <text x="48" y="48" fill="#e2e8f0" font-size="20" font-weight="700">Deterministic fractal growth — no model, no RNG</text>
  <text x="48" y="74" fill="#64748b" font-size="13">The Sahli-Costabal fractal tree, reimplemented. Five geometric rules, applied for N_it generations.</text>

  <!-- rules, left column -->
  <g>
    <!-- rule 1 -->
    <rect x="48" y="112" width="600" height="58" rx="10" fill="#0d1117" stroke="#22d3ee" stroke-width="1.2" />
    <text x="72" y="138" fill="#67e8f9" font-size="13" font-weight="700">_grow_initial_trunk</text>
    <text x="72" y="158" fill="#94a3b8" font-size="11">a straight initial segment from the root</text>
    <!-- rule 2 -->
    <rect x="48" y="180" width="600" height="58" rx="10" fill="#0d1117" stroke="#22d3ee" stroke-width="1.2" />
    <text x="72" y="206" fill="#67e8f9" font-size="13" font-weight="700">_spawn_fascicles</text>
    <text x="72" y="226" fill="#94a3b8" font-size="11">seed the initial fascicles that branch outward</text>
    <!-- rule 3 -->
    <rect x="48" y="248" width="600" height="58" rx="10" fill="#0d1117" stroke="#22d3ee" stroke-width="1.2" />
    <text x="72" y="274" fill="#67e8f9" font-size="13" font-weight="700">_branch_generation — bifurcate</text>
    <text x="72" y="294" fill="#94a3b8" font-size="11">two children per tip, rotated ±branch_angle via fixed 2×2 Rplus / Rminus</text>
    <!-- rule 4 -->
    <rect x="48" y="316" width="600" height="58" rx="10" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.7" />
    <text x="72" y="342" fill="#67e8f9" font-size="13" font-weight="700">_growing_generation — extend + repel</text>
    <text x="72" y="362" fill="#cbd5e1" font-size="11">each tip steps l_segment along repulsion gradient w·(pred − nearest)/dist</text>
    <!-- rule 5 -->
    <rect x="48" y="384" width="600" height="58" rx="10" fill="#0d1117" stroke="#22d3ee" stroke-width="1.2" />
    <text x="72" y="410" fill="#67e8f9" font-size="13" font-weight="700">terminate</text>
    <text x="72" y="430" fill="#94a3b8" font-size="11">stop a branch on collision with a non-sibling node, or on leaving the domain</text>
  </g>

  <!-- tree glyph, right -->
  <rect x="684" y="112" width="388" height="330" rx="14" fill="#0b0e14" stroke="#1e293b" stroke-width="1.2" />
  <text x="878" y="142" text-anchor="middle" fill="#94a3b8" font-size="12.5" font-weight="700">±angle bifurcation · repulsion spread</text>
  <g stroke="#67e8f9" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="878" y1="412" x2="878" y2="356" />
    <line x1="878" y1="356" x2="820" y2="320" /><line x1="878" y1="356" x2="936" y2="320" />
    <line x1="820" y1="320" x2="784" y2="282" /><line x1="820" y1="320" x2="836" y2="276" />
    <line x1="936" y1="320" x2="920" y2="276" /><line x1="936" y1="320" x2="972" y2="282" />
    <line x1="784" y1="282" x2="760" y2="246" /><line x1="784" y1="282" x2="794" y2="240" />
    <line x1="836" y1="276" x2="826" y2="236" /><line x1="836" y1="276" x2="858" y2="244" />
    <line x1="920" y1="276" x2="898" y2="244" /><line x1="920" y1="276" x2="930" y2="236" />
    <line x1="972" y1="282" x2="962" y2="240" /><line x1="972" y1="282" x2="996" y2="246" />
  </g>
  <g fill="#22d3ee">
    <circle cx="760" cy="246" r="3" /><circle cx="794" cy="240" r="3" /><circle cx="826" cy="236" r="3" /><circle cx="858" cy="244" r="3" />
    <circle cx="898" cy="244" r="3" /><circle cx="930" cy="236" r="3" /><circle cx="962" cy="240" r="3" /><circle cx="996" cy="246" r="3" />
  </g>
  <text x="878" y="428" text-anchor="middle" fill="#64748b" font-size="10.5">dots = degree-1 leaves → Purkinje-muscle junctions (PMJs)</text>

  <text x="48" y="486" fill="#475569" font-size="12.5">Determinism is structural: <tspan fill="#94a3b8">same mesh + params → the same tree, every run</tspan>. The PCG64 seed in config.py is never rolled on the growth path —</text>
  <text x="48" y="508" fill="#475569" font-size="12.5">the np.random.seed(...) calls in the docs and e2e test are no-ops for growth.</text>
</svg>
