<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="1120" height="470" fill="#0a0a0a" />
  <text x="48" y="48" fill="#e2e8f0" font-size="20" font-weight="700">Honest scope — what's proven, and where the depth ends</text>
  <text x="48" y="74" fill="#64748b" font-size="13">A faithful repackaging of a research method — actively developed, properly shipped, but not yet a benchmarked product.</text>

  <!-- proven panel -->
  <rect x="48" y="104" width="500" height="318" rx="12" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.3" />
  <text x="72" y="138" fill="#67e8f9" font-size="14" font-weight="700">PROVEN &amp; COMMITTED</text>
  <g font-size="12.5">
    <path d="M76 170 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="176" fill="#cbd5e1">published — PyPI purkinje-uv 0.4.0, OIDC release</text>
    <path d="M76 206 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="212" fill="#cbd5e1">107 tests / 19 files · dual-Python tox CI · cov ≥ 90%</text>
    <path d="M76 242 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="248" fill="#cbd5e1">UV parameterization + arc-length metric 0.5·tr(FᵀF)</text>
    <path d="M76 278 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="284" fill="#cbd5e1">deterministic fractal growth — no RNG on the path</text>
    <path d="M76 314 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="320" fill="#cbd5e1">opt-in eikonal activation (FIM, fixed cv 2.5 m/s)</text>
    <path d="M76 350 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="356" fill="#cbd5e1">committed artifact — 3,094-segment ellipsoid tree</text>
    <path d="M76 386 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="392" fill="#cbd5e1">VTU / VTP line-mesh + PMJ export via meshio / VTK</text>
  </g>

  <!-- boundary panel -->
  <rect x="572" y="104" width="500" height="318" rx="12" fill="#0b0e14" stroke="#475569" stroke-width="1.2" />
  <text x="596" y="138" fill="#94a3b8" font-size="14" font-weight="700">WHERE THE DEPTH ENDS</text>
  <g font-size="12.5" fill="#94a3b8">
    <text x="596" y="172">→ no throughput number is committed</text>
    <text x="616" y="192" fill="#64748b" font-size="11">the real-ventricle node counts live in an untracked local log</text>
    <text x="596" y="226">→ no golden / numerical-equality test</text>
    <text x="616" y="246" fill="#64748b" font-size="11">the e2e test only checks the network is non-empty + parseable</text>
    <text x="596" y="280">→ Branch / Nodes are a legacy parallel API</text>
    <text x="616" y="300" fill="#64748b" font-size="11">exported + tested, but grow_tree reimplements growth inline</text>
    <text x="596" y="334">→ closed surfaces won't parameterize</text>
    <text x="616" y="354" fill="#64748b" font-size="11">uv_bc needs a boundary loop; CV is a fixed isotropic constant</text>
    <text x="596" y="388">→ deps are unpinned against a stale 3.8 floor</text>
    <text x="616" y="408" fill="#64748b" font-size="11">a clean install today is not guaranteed</text>
  </g>

  <text x="560" y="454" text-anchor="middle" fill="#64748b" font-size="12">Every line on the right is verifiable from the repo — named here rather than discovered in an interview.</text>
</svg>
