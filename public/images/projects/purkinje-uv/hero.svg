<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="&#39;Geist&#39;, system-ui, sans-serif">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#7dd3fc" fill-opacity="0.10"></circle>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="6%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.16"></stop>
      <stop offset="72%" stop-color="#22d3ee" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="hotglow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDev="14" flood-color="#22d3ee" flood-opacity="0.40"></feDropShadow>
    </filter>
  </defs>

  
  <rect width="1200" height="630" fill="#0a0a0a"></rect>
  <rect width="1200" height="630" fill="url(#dots)"></rect>
  <rect width="1200" height="630" fill="url(#glow)"></rect>

  
  <text x="64" y="92" font-size="52" font-weight="700" letter-spacing="-1.5" fill="#ffffff">PurkinjeUV</text>
  <text x="378" y="91" font-size="19" font-weight="500" fill="#22d3ee">fractal Purkinje networks on cardiac surfaces</text>
  <text x="64" y="138" font-size="21" fill="#a3a3a3">Grow the tree where it&#39;s easy, in a flattened UV chart, then map it back to 3D.</text>

  
  <g fill="none">
    <rect x="64" y="233" width="230.5" height="160" rx="16" stroke="#262626" stroke-width="1.5" fill="#ffffff" fill-opacity="0.012"></rect>
    <rect x="344.5" y="233" width="230.5" height="160" rx="16" stroke="#262626" stroke-width="1.5" fill="#ffffff" fill-opacity="0.012"></rect>
    <rect x="625" y="233" width="230.5" height="160" rx="16" stroke="#22d3ee" stroke-width="1.5" fill="#ffffff" fill-opacity="0.012" filter="url(#hotglow)"></rect>
    <rect x="905.5" y="233" width="230.5" height="160" rx="16" stroke="#262626" stroke-width="1.5" fill="#ffffff" fill-opacity="0.012"></rect>
  </g>

  
  <g transform="translate(133.25,255)" fill="none" stroke="#3f5560" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 52 A40 40 0 0 1 86 52"></path>
    <line x1="6" y1="52" x2="86" y2="52"></line>
    <path d="M46 12 L18 52 M46 12 L34 52 M46 12 L58 52 M46 12 L74 52"></path>
    <path d="M22 38 Q46 30 70 38"></path>
  </g>
  <text x="179.25" y="345" font-size="16" font-weight="700" fill="#e8eef0" text-anchor="middle">cardiac surface</text>
  <text x="179.25" y="368" font-size="12.5" fill="#737373" text-anchor="middle">triangulated 3D mesh</text>

  
  <g transform="translate(302.5,306)" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="2" y1="7" x2="28" y2="7"></line>
    <path d="M22 2 L30 7 L22 12"></path>
  </g>

  
  <g transform="translate(429.75,255)" fill="none" stroke="#3f5560" stroke-width="1.5">
    <rect x="6" y="6" width="48" height="48" rx="2"></rect>
    <line x1="22" y1="6" x2="22" y2="54"></line>
    <line x1="38" y1="6" x2="38" y2="54"></line>
    <line x1="6" y1="22" x2="54" y2="22"></line>
    <line x1="6" y1="38" x2="54" y2="38"></line>
  </g>
  <text x="459.75" y="345" font-size="16" font-weight="700" fill="#e8eef0" text-anchor="middle">UV chart (2D)</text>
  <text x="459.75" y="368" font-size="12.5" fill="#737373" text-anchor="middle">Laplace + arc-length metric</text>

  
  <g transform="translate(583,306)" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="2" y1="7" x2="28" y2="7"></line>
    <path d="M22 2 L30 7 L22 12"></path>
  </g>

  
  <g transform="translate(710.25,255)" fill="none" stroke="#22d3ee" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M30 56 L30 36"></path>
    <path d="M30 36 L16 22 M30 36 L44 22"></path>
    <path d="M16 22 L9 10 M16 22 L21 10 M44 22 L39 10 M44 22 L51 10"></path>
  </g>
  <text x="740.25" y="345" font-size="16" font-weight="700" fill="#22d3ee" text-anchor="middle">fractal growth</text>
  <text x="740.25" y="368" font-size="12.5" fill="#737373" text-anchor="middle">deterministic · no RNG</text>

  
  <g transform="translate(863.5,306)" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="2" y1="7" x2="28" y2="7"></line>
    <path d="M22 2 L30 7 L22 12"></path>
  </g>

  
  <g transform="translate(974.75,255)" fill="none" stroke="#3f5560" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 52 A40 40 0 0 1 86 52"></path>
    <line x1="6" y1="52" x2="86" y2="52"></line>
    <path d="M46 50 L46 34 M46 34 L36 22 M46 34 L56 22"></path>
  </g>
  <text x="1020.75" y="345" font-size="16" font-weight="700" fill="#e8eef0" text-anchor="middle">map back to 3D</text>
  <text x="1020.75" y="368" font-size="12.5" fill="#737373" text-anchor="middle">barycentric interpolation</text>

  
  <rect x="64" y="486" width="1072" height="94" rx="14" stroke="#262626" stroke-width="1" fill="#ffffff" fill-opacity="0.012"></rect>
  <text x="600" y="521" font-size="21" fill="#d4d4d4" text-anchor="middle">A modular scientific-Python package built on one idea:</text>
  <text x="600" y="553" font-size="21" font-weight="600" fill="#7dd3fc" text-anchor="middle">grow the surface-constrained tree in a flattened 2D UV chart, then map it back to 3D.</text>
</svg>