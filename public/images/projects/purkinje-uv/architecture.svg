<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" font-family="&#39;Geist Mono&#39;, ui-monospace, monospace">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#7dd3fc" fill-opacity="0.08"></circle>
    </pattern>
    <radialGradient id="glow" cx="32%" cy="2%" r="46%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.13"></stop>
      <stop offset="70%" stop-color="#22d3ee" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="hotglow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDev="14" flood-color="#22d3ee" flood-opacity="0.40"></feDropShadow>
    </filter>
  </defs>

  
  <rect width="1120" height="600" fill="#0a0a0a"></rect>
  <rect width="1120" height="600" fill="url(#dots)"></rect>
  <rect width="1120" height="600" fill="url(#glow)"></rect>

  
  <text x="40" y="46" font-size="25" font-weight="700" letter-spacing="-0.3" fill="#ffffff">Pipeline: grow in UV space, map back, then optionally activate</text>

  
  <rect x="40" y="170" width="216" height="108" rx="11" fill="#ffffff" fill-opacity="0.014" stroke="#22d3ee" stroke-width="1.5"></rect>
  <rect x="288" y="161" width="248" height="126" rx="11" fill="#ffffff" fill-opacity="0.014" stroke="#22d3ee" stroke-width="1.5" filter="url(#hotglow)"></rect>
  <rect x="568" y="170" width="188" height="108" rx="11" fill="#ffffff" fill-opacity="0.014" stroke="#22d3ee" stroke-width="1.5"></rect>
  <rect x="794" y="179" width="254" height="90" rx="11" fill="#ffffff" fill-opacity="0.014" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5 4"></rect>
  <rect x="628" y="312" width="340" height="72" rx="11" fill="#ffffff" fill-opacity="0.014" stroke="#22d3ee" stroke-width="1.5"></rect>

  
  <g text-anchor="middle">
    <text x="148" y="198" font-size="15" font-weight="700" fill="#22d3ee">Mesh.uvmap</text>
    <text x="148" y="221" font-size="12" fill="#d4d4d4">OBJ / VTU surface in</text>
    <text x="148" y="239" font-size="12" fill="#d4d4d4">two Laplace solves →</text>
    <text x="148" y="257" font-size="12" fill="#d4d4d4">(u, v) per vertex</text>
  </g>

  
  <g text-anchor="middle">
    <text x="412" y="189" font-size="15" font-weight="700" fill="#22d3ee">FractalTree.grow_tree</text>
    <text x="412" y="212" font-size="12" font-weight="700" fill="#ffffff">deterministic, runs in 2D UV</text>
    <text x="412" y="230" font-size="12" fill="#d4d4d4">trunk → fascicles</text>
    <text x="412" y="248" font-size="12" fill="#d4d4d4">bifurcate ±branch_angle</text>
    <text x="412" y="266" font-size="12" fill="#d4d4d4">grow along repulsion gradient</text>
  </g>

  
  <g text-anchor="middle">
    <text x="662" y="198" font-size="15" font-weight="700" fill="#ffffff">_finalize_outputs</text>
    <text x="662" y="221" font-size="12" fill="#d4d4d4">barycentric interp</text>
    <text x="662" y="239" font-size="12" fill="#d4d4d4">UV → XYZ</text>
    <text x="662" y="257" font-size="12" fill="#d4d4d4">network on the surface</text>
  </g>

  
  <g text-anchor="middle">
    <text x="921" y="207" font-size="15" font-weight="700" fill="#22d3ee">PurkinjeTree.activate_fim</text>
    <text x="921" y="230" font-size="12" fill="#d4d4d4">FIM eikonal solve</text>
    <text x="921" y="248" font-size="12" fill="#d4d4d4">fixed cv = 2.5 m/s · isotropic D</text>
  </g>

  
  <g text-anchor="middle">
    <text x="798" y="340" font-size="15" font-weight="700" fill="#22d3ee">outputs · meshio + VTK</text>
    <text x="798" y="363" font-size="12" fill="#d4d4d4">VTU / VTP line mesh · PMJs (degree-1 leaves)</text>
  </g>

  
  <g fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(258,217)"><line x1="2" y1="7" x2="26" y2="7"></line><path d="M20 2 L28 7 L20 12"></path></g>
    <g transform="translate(538,217)"><line x1="2" y1="7" x2="26" y2="7"></line><path d="M20 2 L28 7 L20 12"></path></g>
    <g transform="translate(758,217)" stroke-dasharray="3 3"><line x1="2" y1="7" x2="26" y2="7"></line></g>
    <g transform="translate(758,217)"><path d="M20 2 L28 7 L20 12"></path></g>
    <g transform="translate(650,280)"><line x1="7" y1="2" x2="7" y2="20"></line><path d="M2 14 L7 22 L12 14"></path></g>
  </g>
  <text x="672" y="294" font-size="12" fill="#737373">geometry-only ✓</text>

  
  <text x="40" y="360" font-size="14" font-weight="700" fill="#22d3ee">Public API</text>
  <rect x="40" y="374" width="560" height="117" rx="11" fill="#ffffff" fill-opacity="0.014" stroke="#262626" stroke-width="1"></rect>
  <g font-size="13.5" fill="#d4d4d4">
    <text x="62" y="410"><tspan fill="#22d3ee" font-weight="700">FractalTreeParameters</tspan> · FractalTree(params).grow_tree().save()</text>
    <text x="62" y="437"><tspan fill="#22d3ee" font-weight="700">Mesh</tspan>(filename | verts, conn): geometry · FEM · UV mapping</text>
    <text x="62" y="464"><tspan fill="#22d3ee" font-weight="700">PurkinjeTree</tspan>(nodes, conn, end_nodes).activate_fim() / .save_pmjs()</text>
  </g>
</svg>