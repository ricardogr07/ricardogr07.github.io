<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="uv-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#22d3ee" /></marker>
  </defs>
  <rect width="1120" height="520" fill="#0a0a0a" />
  <text x="48" y="48" fill="#e2e8f0" font-size="20" font-weight="700">The UV trick: grow where the geometry is flat</text>
  <text x="48" y="74" fill="#64748b" font-size="13">Surface-constrained growth in raw 3D is all projection + collision tests. Flatten once, grow in 2D, map the result back.</text>

  <!-- panel A: 3D surface -->
  <rect x="48" y="116" width="300" height="300" rx="14" fill="#0d1117" stroke="#475569" stroke-width="1.2" />
  <text x="198" y="148" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">curved surface (3D)</text>
  <path d="M96 320 A 100 86 0 0 1 300 320" fill="none" stroke="#67e8f9" stroke-width="1.8" />
  <line x1="96" y1="320" x2="300" y2="320" stroke="#67e8f9" stroke-width="1.8" />
  <g stroke="#2c6470" stroke-width="1" fill="none">
    <line x1="198" y1="320" x2="198" y2="238" />
    <path d="M128 320 Q198 268 198 238" /><path d="M268 320 Q198 268 198 238" />
    <path d="M112 308 Q198 284 284 308" /><path d="M124 290 Q198 270 272 290" />
    <line x1="148" y1="319" x2="198" y2="238" /><line x1="248" y1="319" x2="198" y2="238" />
  </g>
  <text x="198" y="360" text-anchor="middle" fill="#64748b" font-size="11">every growth step needs</text>
  <text x="198" y="378" text-anchor="middle" fill="#64748b" font-size="11">a projection onto the mesh</text>

  <path d="M356 266 H392" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#uv-ar)" />
  <text x="374" y="252" text-anchor="middle" fill="#64748b" font-size="10">flatten</text>

  <!-- panel B: UV chart -->
  <rect x="400" y="116" width="320" height="300" rx="14" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.6" />
  <text x="560" y="148" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">Laplacian UV chart (2D)</text>
  <rect x="478" y="176" width="164" height="120" rx="3" fill="none" stroke="#3a5560" stroke-width="1.3" />
  <g stroke="#1e3a42" stroke-width="1">
    <line x1="519" y1="176" x2="519" y2="296" /><line x1="560" y1="176" x2="560" y2="296" /><line x1="601" y1="176" x2="601" y2="296" />
    <line x1="478" y1="206" x2="642" y2="206" /><line x1="478" y1="236" x2="642" y2="236" /><line x1="478" y1="266" x2="642" y2="266" />
  </g>
  <g stroke="#67e8f9" stroke-width="1.5" fill="none" stroke-linecap="round">
    <line x1="560" y1="290" x2="560" y2="252" />
    <line x1="560" y1="252" x2="532" y2="230" /><line x1="560" y1="252" x2="588" y2="230" />
    <line x1="532" y1="230" x2="514" y2="210" /><line x1="532" y1="230" x2="540" y2="206" />
    <line x1="588" y1="230" x2="580" y2="206" /><line x1="588" y1="230" x2="606" y2="210" />
  </g>
  <text x="560" y="330" text-anchor="middle" fill="#cbd5e1" font-size="10.5">two Laplace solves, sinusoidal boundary BCs</text>
  <text x="560" y="350" text-anchor="middle" fill="#cbd5e1" font-size="10.5">metric 0.5·tr(FᵀF) keeps steps</text>
  <text x="560" y="368" text-anchor="middle" fill="#cbd5e1" font-size="10.5">arc-length-correct on the curved surface</text>
  <text x="560" y="392" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="700">growth is now plain 2D geometry</text>

  <path d="M728 266 H764" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#uv-ar)" />
  <text x="746" y="252" text-anchor="middle" fill="#64748b" font-size="10">map back</text>

  <!-- panel C: mapped back -->
  <rect x="772" y="116" width="300" height="300" rx="14" fill="#0d1117" stroke="#475569" stroke-width="1.2" />
  <text x="922" y="148" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">network on the 3D surface</text>
  <path d="M820 320 A 100 86 0 0 1 1024 320" fill="none" stroke="#3a5560" stroke-width="1.8" />
  <line x1="820" y1="320" x2="1024" y2="320" stroke="#3a5560" stroke-width="1.8" />
  <g stroke="#67e8f9" stroke-width="1.6" fill="none" stroke-linecap="round">
    <path d="M922 318 V270" />
    <path d="M922 270 Q894 250 880 238" /><path d="M922 270 Q950 250 964 238" />
    <path d="M880 238 Q868 226 860 216" /><path d="M880 238 Q884 224 888 214" />
    <path d="M964 238 Q960 224 956 214" /><path d="M964 238 Q976 226 984 216" />
  </g>
  <text x="922" y="360" text-anchor="middle" fill="#64748b" font-size="11">barycentric interpolation</text>
  <text x="922" y="378" text-anchor="middle" fill="#64748b" font-size="11">UV coords → surface XYZ</text>

  <text x="560" y="456" text-anchor="middle" fill="#64748b" font-size="12.5">The parameterization is the whole idea: solve the hard 3D problem once, then grow on a flat chart you can reason about. Not an ML step in sight.</text>
</svg>
