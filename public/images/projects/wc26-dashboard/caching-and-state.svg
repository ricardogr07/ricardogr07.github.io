<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="ca-ar-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#22d3ee" /></marker>
    <marker id="ca-ar-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#f59e0b" /></marker>
  </defs>
  <rect width="1120" height="520" fill="#0a0a0a" />
  <text x="48" y="48" fill="#e2e8f0" font-size="20" font-weight="700">Caching keyed by the tournament, not the request</text>
  <text x="48" y="74" fill="#64748b" font-size="13">The cache lives exactly as long as the real tournament stands still. One finished match invalidates it; a what-if never touches it.</text>

  <!-- start -->
  <rect x="48" y="128" width="190" height="58" rx="11" fill="#0d1117" stroke="#22d3ee" stroke-width="1.3" />
  <text x="143" y="153" text-anchor="middle" fill="#67e8f9" font-size="12.5" font-weight="700">POST /simulate</text>
  <text x="143" y="173" text-anchor="middle" fill="#64748b" font-size="10.5">request arrives</text>
  <path d="M238 157 H286" fill="none" stroke="#22d3ee" stroke-width="1.7" marker-end="url(#ca-ar-c)" />

  <!-- decision 1: overrides? -->
  <path d="M390 116 L468 157 L390 198 L312 157 Z" fill="#0d1117" stroke="#818cf8" stroke-width="1.3" />
  <text x="390" y="153" text-anchor="middle" fill="#a5b4fc" font-size="11.5" font-weight="700">scenario</text>
  <text x="390" y="170" text-anchor="middle" fill="#a5b4fc" font-size="11.5" font-weight="700">overrides?</text>

  <!-- overrides yes -> fresh -->
  <path d="M468 157 H560" fill="none" stroke="#f59e0b" stroke-width="1.7" marker-end="url(#ca-ar-a)" />
  <text x="512" y="148" text-anchor="middle" fill="#f59e0b" font-size="10.5">yes</text>
  <rect x="564" y="128" width="220" height="58" rx="11" fill="#140f02" stroke="#f59e0b" stroke-width="1.3" />
  <text x="674" y="153" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">fresh 10k run · bypass cache</text>
  <text x="674" y="173" text-anchor="middle" fill="#b08436" font-size="10.5">what-ifs are never stored</text>

  <!-- overrides no -> decision 2 -->
  <path d="M390 198 V236" fill="none" stroke="#22d3ee" stroke-width="1.7" marker-end="url(#ca-ar-c)" />
  <text x="404" y="222" fill="#64748b" font-size="10.5">no</text>
  <path d="M390 244 L488 292 L390 340 L292 292 Z" fill="#0d1117" stroke="#67e8f9" stroke-width="1.3" />
  <text x="390" y="284" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="700">completed-match</text>
  <text x="390" y="301" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="700">count == cached?</text>

  <!-- count yes -> serve cached -->
  <path d="M488 292 H560" fill="none" stroke="#22d3ee" stroke-width="1.7" marker-end="url(#ca-ar-c)" />
  <text x="524" y="283" text-anchor="middle" fill="#22d3ee" font-size="10.5">yes</text>
  <rect x="564" y="263" width="220" height="58" rx="11" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.6" />
  <text x="674" y="288" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="700">return cached doc</text>
  <text x="674" y="308" text-anchor="middle" fill="#94a3b8" font-size="10.5">cached result doc · instant</text>

  <!-- count no -> recompute -->
  <path d="M390 340 V378" fill="none" stroke="#22d3ee" stroke-width="1.7" marker-end="url(#ca-ar-c)" />
  <text x="404" y="364" fill="#64748b" font-size="10.5">no — a match finished</text>
  <rect x="280" y="384" width="220" height="58" rx="11" fill="#0d1117" stroke="#22d3ee" stroke-width="1.3" />
  <text x="390" y="409" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="700">recompute 10k → upsert</text>
  <text x="390" y="429" text-anchor="middle" fill="#94a3b8" font-size="10.5">becomes the new baseline doc</text>

  <!-- invalidation explainer, right -->
  <rect x="824" y="128" width="248" height="314" rx="14" fill="#0b0e14" stroke="#1e293b" stroke-width="1.2" />
  <text x="948" y="158" text-anchor="middle" fill="#94a3b8" font-size="12.5" font-weight="700">the cache key</text>
  <text x="848" y="190" fill="#cbd5e1" font-size="11.5">= number of completed</text>
  <text x="848" y="208" fill="#cbd5e1" font-size="11.5">  matches in Cosmos</text>
  <line x1="848" y1="226" x2="1048" y2="226" stroke="#1e293b" stroke-width="1" />
  <text x="848" y="252" fill="#64748b" font-size="11">that count only changes</text>
  <text x="848" y="270" fill="#64748b" font-size="11">when the timer-triggered</text>
  <text x="848" y="288" fill="#64748b" font-size="11">match sync records a</text>
  <text x="848" y="306" fill="#64748b" font-size="11">finished real match —</text>
  <text x="848" y="330" fill="#67e8f9" font-size="11.5" font-weight="700">so the cache lives as long</text>
  <text x="848" y="348" fill="#67e8f9" font-size="11.5" font-weight="700">as the real tournament</text>
  <text x="848" y="366" fill="#67e8f9" font-size="11.5" font-weight="700">stands still.</text>
  <text x="848" y="398" fill="#64748b" font-size="10.5">no TTLs, no manual purges —</text>
  <text x="848" y="414" fill="#64748b" font-size="10.5">invalidation is a fact of the</text>
  <text x="848" y="430" fill="#64748b" font-size="10.5">domain, not a guess.</text>

  <text x="48" y="486" fill="#475569" font-size="12.5">The honest framing of "10,000 sims, instant": baseline odds are precomputed once per tournament-state and reused; only the moment reality moves do we pay the compute again.</text>
</svg>
