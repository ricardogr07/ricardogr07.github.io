<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="1120" height="470" fill="#0a0a0a" />
  <text x="48" y="48" fill="#e2e8f0" font-size="20" font-weight="700">Honest scope — what's proven, and where the depth ends</text>
  <text x="48" y="74" fill="#64748b" font-size="13">A real, deployed product shipped fast for a real pool — strong as an engineering story, modest as a forecasting model.</text>

  <!-- proven panel -->
  <rect x="48" y="104" width="500" height="318" rx="12" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.3" />
  <text x="72" y="138" fill="#67e8f9" font-size="14" font-weight="700">PROVEN &amp; SHIPPED</text>
  <g font-size="12.5">
    <path d="M76 170 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="176" fill="#cbd5e1">live on Azure — SWA front end + Functions API</text>
    <path d="M76 206 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="212" fill="#cbd5e1">116 tests / 9 files · CI green on every push</text>
    <path d="M76 242 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="248" fill="#cbd5e1">real Cosmos cache, invalidated by tournament progress</text>
    <path d="M76 278 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="284" fill="#cbd5e1">live Elo updates (K=32) from a sports API</text>
    <path d="M76 314 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="320" fill="#cbd5e1">pure engine — full tournament 10k in &lt; 3 s, CI-enforced</text>
    <path d="M76 350 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="356" fill="#cbd5e1">bilingual es/en · conception → live in 3 days</text>
    <path d="M76 386 l7 7 l13 -15" fill="none" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="108" y="392" fill="#cbd5e1">compute/IO boundary enforced by a purity test</text>
  </g>

  <!-- boundary panel -->
  <rect x="572" y="104" width="500" height="318" rx="12" fill="#0b0e14" stroke="#475569" stroke-width="1.2" />
  <text x="596" y="138" fill="#94a3b8" font-size="14" font-weight="700">WHERE THE DEPTH ENDS</text>
  <g font-size="12.5" fill="#94a3b8">
    <text x="596" y="172">→ no calibration or backtest</text>
    <text x="616" y="192" fill="#64748b" font-size="11">probabilities are modelled, not validated against outcomes/odds</text>
    <text x="596" y="226">→ the match model is deliberately simple</text>
    <text x="616" y="246" fill="#64748b" font-size="11">fixed 25% draw rate + random 1–3 goal margin (both unsourced)</text>
    <text x="596" y="280">→ random selection among third-place qualifiers</text>
    <text x="616" y="300" fill="#64748b" font-size="11">not the FIFA criteria; no penalties/ET model; no home advantage</text>
    <text x="596" y="334">→ production runs are unseeded</text>
    <text x="616" y="354" fill="#64748b" font-size="11">the seed exists for tests but isn't exposed through the API</text>
    <text x="596" y="388">→ /simulate is anonymous + unbounded; deploy is manual</text>
    <text x="616" y="408" fill="#64748b" font-size="11">no rate limit on run count; auto-on-push is a pending phase</text>
  </g>

  <text x="560" y="454" text-anchor="middle" fill="#64748b" font-size="12">Every line on the right is verifiable from the repo — named here rather than discovered in an interview.</text>
</svg>
