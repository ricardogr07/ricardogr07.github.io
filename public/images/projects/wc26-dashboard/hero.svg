<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="&#39;Geist Mono&#39;, ui-monospace, &#39;SFMono-Regular&#39;, Menlo, monospace">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"></stop><stop offset="1" stop-color="#7dd3fc"></stop>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.11"></stop>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"></stop>
    </radialGradient>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0 H0 V46" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"></path>
    </pattern>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#22d3ee" fill-opacity="0.6"></polygon>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a"></rect>
  <rect width="1200" height="630" fill="url(#grid)"></rect>
  <ellipse cx="624" cy="290" rx="320" ry="200" fill="url(#glow)"></ellipse>

  
  <text x="64" y="80" font-family="&#39;Geist&#39;, system-ui, sans-serif" font-size="54" font-weight="700" letter-spacing="-1.3" fill="#ffffff">WC26 Dashboard</text>
  <text x="494" y="80" font-size="18" font-weight="500" fill="#7dd3fc">live World Cup pool forecasting</text>

  
  <line x1="600" y1="192" x2="600" y2="248" stroke="#fbbf24" stroke-opacity="0.55" stroke-width="1" stroke-dasharray="3 4"></line>
  <rect x="442" y="148" width="316" height="30" rx="15" fill="rgba(251,191,36,0.06)" stroke="#fbbf24" stroke-opacity="0.6" stroke-width="1"></rect>
  <text x="600" y="167" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#fbbf24">scenario override → always a fresh run</text>

  
  <g stroke="#22d3ee" stroke-opacity="0.6" stroke-width="1.5">
    <line x1="307" y1="350" x2="326" y2="350" marker-end="url(#ah)"></line>
    <line x1="591" y1="350" x2="610" y2="350" marker-end="url(#ah)"></line>
    <line x1="874" y1="350" x2="893" y2="350" marker-end="url(#ah)"></line>
  </g>

  
  <g fill="#0d1117" stroke="#262b33" stroke-width="1.5">
    <rect x="64" y="248" width="233.7" height="204" rx="12"></rect>
    <rect x="335.7" y="248" width="245.3" height="204" rx="12"></rect>
    <rect x="619" y="248" width="245.3" height="204" rx="12"></rect>
    <rect x="902.3" y="248" width="233.7" height="204" rx="12"></rect>
  </g>

  
  <text x="180.8" y="284" text-anchor="middle" font-size="15" font-weight="700" fill="#f5f5f5">tournament state</text>
  <g font-size="13">
    <text x="92" y="320" fill="#22d3ee">✓</text><text x="110" y="320" fill="#d4d4d4">completed, pinned</text>
    <text x="92" y="349" fill="#22d3ee">✓</text><text x="110" y="349" fill="#d4d4d4">completed, pinned</text>
    <circle cx="96" cy="374" r="3.5" fill="#737373"></circle><text x="110" y="378" fill="#737373">remaining, sampled</text>
  </g>
  <text x="180.8" y="434" text-anchor="middle" font-size="11.5" fill="#737373">104 matches · 48 teams</text>

  
  <text x="458.3" y="284" text-anchor="middle" font-size="15" font-weight="700" fill="#f5f5f5">Elo win-prob</text>
  <g fill="#7dd3fc" font-size="17">
    <text x="392" y="356" dominant-baseline="middle">P =</text>
    <text x="486" y="338" text-anchor="middle">1</text>
    <line x1="438" y1="350" x2="534" y2="350" stroke="#7dd3fc" stroke-opacity="0.75" stroke-width="1.5"></line>
    <text x="486" y="372" text-anchor="middle">1 + 10<tspan font-size="11" dy="-7">Δ/400</tspan></text>
  </g>
  <text x="458.3" y="412" text-anchor="middle" font-size="12" fill="#737373">ratings live-updated after</text>
  <text x="458.3" y="429" text-anchor="middle" font-size="12" fill="#737373">each real match (K=32)</text>

  
  <text x="741.7" y="284" text-anchor="middle" font-size="15" font-weight="700" fill="#f5f5f5">Monte Carlo ×10k</text>
  <rect x="680" y="312" width="123.4" height="50" rx="8" fill="none" stroke="#262b33" stroke-width="1"></rect>
  <text x="741.7" y="332" text-anchor="middle" font-size="13" fill="#d4d4d4">sample groups</text>
  <text x="741.7" y="350" text-anchor="middle" font-size="13" fill="#d4d4d4">+ knockout</text>
  <text x="741.7" y="392" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f5">pure Python · seedable</text>

  
  <text x="1019.1" y="284" text-anchor="middle" font-size="15" font-weight="700" fill="#f5f5f5">pool standings</text>
  <g font-size="12" fill="#a3a3a3">
    <text x="924" y="326">P1</text><rect x="950" y="318" width="155" height="8" rx="4" fill="url(#bar)"></rect>
    <text x="924" y="352">P2</text><rect x="950" y="344" width="126" height="8" rx="4" fill="url(#bar)"></rect>
    <text x="924" y="378">P3</text><rect x="950" y="370" width="97" height="8" rx="4" fill="url(#bar)"></rect>
    <text x="924" y="404">P4</text><rect x="950" y="396" width="72" height="8" rx="4" fill="url(#bar)"></rect>
    <text x="924" y="430">P5</text><rect x="950" y="422" width="47" height="8" rx="4" fill="url(#bar)"></rect>
  </g>
  <text x="1019.1" y="446" text-anchor="middle" font-size="11.5" fill="#737373">P(1st-5th) per player</text>

  
  <rect x="64" y="498" width="1072" height="88" rx="14" fill="#0d1117" stroke="#262b33" stroke-width="1.5"></rect>
  <line x1="421.3" y1="512" x2="421.3" y2="572" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"></line>
  <line x1="778.6" y1="512" x2="778.6" y2="572" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"></line>

  
  <g transform="translate(90,523)">
    <rect x="0" y="0" width="38" height="38" rx="8" fill="none" stroke="#22d3ee" stroke-opacity="0.45" stroke-width="1.6"></rect>
    <path d="M21 7 L11 22 H18 L17 31 L27 15 H20 Z" fill="#22d3ee"></path>
  </g>
  <text x="140" y="518" font-size="16" font-weight="700" fill="#ffffff">Azure Functions</text>
  <text x="140" y="538" font-size="12.5" fill="#a3a3a3">serverless Python, 10,000×</text>
  <text x="140" y="555" font-size="12.5" fill="#a3a3a3">per run in under 3 s</text>

  
  <g transform="translate(447,523)">
    <circle cx="19" cy="19" r="9" fill="none" stroke="#22d3ee" stroke-width="1.8"></circle>
    <ellipse cx="19" cy="19" rx="16" ry="6.5" fill="none" stroke="#22d3ee" stroke-opacity="0.55" stroke-width="1.6" transform="rotate(-28 19 19)"></ellipse>
    <circle cx="19" cy="19" r="2.4" fill="#22d3ee"></circle>
  </g>
  <text x="497" y="518" font-size="16" font-weight="700" fill="#ffffff">Azure Cosmos DB</text>
  <text x="497" y="538" font-size="12.5" fill="#a3a3a3">baseline odds cache,</text>
  <text x="497" y="555" font-size="12.5" fill="#a3a3a3">invalidated each real match</text>

  
  <g transform="translate(804,523)">
    <circle cx="19" cy="19" r="14" fill="none" stroke="#22d3ee" stroke-width="1.7"></circle>
    <ellipse cx="19" cy="19" rx="6" ry="14" fill="none" stroke="#22d3ee" stroke-opacity="0.7" stroke-width="1.5"></ellipse>
    <path d="M5.5 19 H32.5 M8 12 H30 M8 26 H30" stroke="#22d3ee" stroke-opacity="0.55" stroke-width="1.5"></path>
  </g>
  <text x="854" y="518" font-size="16" font-weight="700" fill="#ffffff">Azure Static Web Apps</text>
  <text x="854" y="538" font-size="12.5" fill="#a3a3a3">bilingual UI served</text>
  <text x="854" y="555" font-size="12.5" fill="#a3a3a3">on a global CDN</text>
</svg>