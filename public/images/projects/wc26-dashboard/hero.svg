<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <radialGradient id="wc-glow" cx="50%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#0e2a2f" />
      <stop offset="55%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </radialGradient>
    <pattern id="wc-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#16202a" stroke-width="1" />
    </pattern>
    <marker id="wc-ar-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#22d3ee" /></marker>
  </defs>

  <rect width="1200" height="630" fill="url(#wc-glow)" />
  <rect width="1200" height="630" fill="url(#wc-grid)" />

  <!-- title -->
  <text x="64" y="92" fill="#f8fafc" font-size="50" font-weight="800" letter-spacing="-1">WC26 Dashboard</text>
  <text x="498" y="92" fill="#67e8f9" font-size="20" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">live World Cup pool forecasting</text>
  <text x="64" y="128" fill="#94a3b8" font-size="20" font-weight="500">A 5-person quiniela, simulated 10,000× — fix a hypothetical result, watch the pool odds shift.</text>

  <!-- scenario badge -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <rect x="596" y="186" width="240" height="30" rx="15" fill="#140f02" stroke="#f59e0b" stroke-width="1.2" />
    <text x="716" y="206" text-anchor="middle" fill="#fcd34d" font-size="12">scenario override → always a fresh run</text>
    <path d="M716 216 V226" fill="none" stroke="#f59e0b" stroke-width="1.4" stroke-dasharray="4 3" />
  </g>

  <!-- 4-stage flow -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <!-- card 1: tournament state -->
    <rect x="64" y="248" width="240" height="158" rx="13" fill="#0d1117" stroke="#22d3ee" stroke-width="1.3" />
    <text x="184" y="280" text-anchor="middle" fill="#e2e8f0" font-size="13.5" font-weight="700">tournament state</text>
    <g>
      <path d="M96 308 l5 5 l10 -11" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <text x="120" y="312" fill="#cbd5e1" font-size="11">completed — pinned</text>
      <path d="M96 332 l5 5 l10 -11" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <text x="120" y="336" fill="#cbd5e1" font-size="11">completed — pinned</text>
      <circle cx="101" cy="358" r="2.5" fill="#64748b" />
      <text x="120" y="362" fill="#94a3b8" font-size="11">remaining — sampled</text>
    </g>
    <text x="184" y="390" text-anchor="middle" fill="#64748b" font-size="10">104 matches · 48 teams</text>

    <path d="M304 327 H326" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#wc-ar-c)" />

    <!-- card 2: Elo win-prob -->
    <rect x="330" y="248" width="240" height="158" rx="13" fill="#0d1117" stroke="#22d3ee" stroke-width="1.3" />
    <text x="450" y="280" text-anchor="middle" fill="#e2e8f0" font-size="13.5" font-weight="700">Elo win-prob</text>
    <rect x="356" y="300" width="188" height="34" rx="7" fill="#0b1f24" stroke="#1e3a42" stroke-width="1" />
    <text x="450" y="322" text-anchor="middle" fill="#67e8f9" font-size="12.5">1 / (1 + 10^(Δ/400))</text>
    <text x="450" y="356" text-anchor="middle" fill="#cbd5e1" font-size="11">neutral site · no home edge</text>
    <text x="450" y="376" text-anchor="middle" fill="#64748b" font-size="10.5">ratings live-updated after</text>
    <text x="450" y="392" text-anchor="middle" fill="#64748b" font-size="10.5">each real match (K=32)</text>

    <path d="M570 327 H592" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#wc-ar-c)" />

    <!-- card 3: Monte Carlo (the heart) -->
    <rect x="596" y="248" width="240" height="158" rx="13" fill="#0b1f24" stroke="#22d3ee" stroke-width="1.9" />
    <text x="716" y="280" text-anchor="middle" fill="#67e8f9" font-size="13.5" font-weight="700">Monte Carlo ×10k</text>
    <g stroke="#1e3a42" stroke-width="1" fill="none">
      <rect x="664" y="298" width="104" height="40" rx="5" />
      <rect x="660" y="294" width="104" height="40" rx="5" stroke="#2c6470" />
      <rect x="656" y="290" width="104" height="40" rx="5" stroke="#3a5560" />
    </g>
    <text x="708" y="315" text-anchor="middle" fill="#cbd5e1" font-size="10.5">sample groups</text>
    <text x="708" y="329" text-anchor="middle" fill="#cbd5e1" font-size="10.5">+ knockout</text>
    <text x="716" y="362" text-anchor="middle" fill="#f8fafc" font-size="10.5" font-weight="700">pure Python · seedable</text>
    <text x="716" y="382" text-anchor="middle" fill="#64748b" font-size="10.5">tally finishes over 10,000 runs</text>

    <path d="M836 327 H858" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#wc-ar-c)" />

    <!-- card 4: pool standings -->
    <rect x="862" y="248" width="240" height="158" rx="13" fill="#0d1117" stroke="#22d3ee" stroke-width="1.3" />
    <text x="982" y="280" text-anchor="middle" fill="#e2e8f0" font-size="13.5" font-weight="700">pool standings</text>
    <g font-size="10">
      <text x="886" y="306" fill="#94a3b8">P1</text><rect x="906" y="298" width="172" height="9" rx="4.5" fill="#0b1f24" /><rect x="906" y="298" width="138" height="9" rx="4.5" fill="#22d3ee" />
      <text x="886" y="324" fill="#94a3b8">P2</text><rect x="906" y="316" width="172" height="9" rx="4.5" fill="#0b1f24" /><rect x="906" y="316" width="104" height="9" rx="4.5" fill="#3ba7bd" />
      <text x="886" y="342" fill="#94a3b8">P3</text><rect x="906" y="334" width="172" height="9" rx="4.5" fill="#0b1f24" /><rect x="906" y="334" width="72" height="9" rx="4.5" fill="#2c7d8e" />
      <text x="886" y="360" fill="#94a3b8">P4</text><rect x="906" y="352" width="172" height="9" rx="4.5" fill="#0b1f24" /><rect x="906" y="352" width="46" height="9" rx="4.5" fill="#246574" />
      <text x="886" y="378" fill="#94a3b8">P5</text><rect x="906" y="370" width="172" height="9" rx="4.5" fill="#0b1f24" /><rect x="906" y="370" width="28" height="9" rx="4.5" fill="#1e5360" />
    </g>
    <text x="982" y="396" text-anchor="middle" fill="#64748b" font-size="10">P(1st–5th) per player</text>
  </g>

  <!-- bounded line -->
  <text x="64" y="448" fill="#475569" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">the full 104-match tournament, <tspan fill="#67e8f9">10,000× in under 3 s</tspan> — pure Python on a free-tier serverless function</text>
  <text x="64" y="470" fill="#475569" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">baseline odds are <tspan fill="#67e8f9">cached in Cosmos</tspan> and invalidated the moment the next real match finishes</text>

  <!-- reliability strip -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <rect x="64" y="500" width="1072" height="74" rx="14" fill="#0b0e14" stroke="#1e293b" stroke-width="1.2" />
    <g>
      <text x="196" y="534" fill="#67e8f9" font-size="22" font-weight="800">live</text>
      <text x="196" y="556" fill="#64748b" font-size="11.5">Azure SWA + Functions</text>
    </g>
    <g>
      <text x="446" y="534" fill="#67e8f9" font-size="22" font-weight="800">116</text>
      <text x="446" y="556" fill="#64748b" font-size="11.5">tests · CI green</text>
    </g>
    <g>
      <text x="690" y="534" fill="#67e8f9" font-size="22" font-weight="800">Cosmos</text>
      <text x="690" y="556" fill="#64748b" font-size="11.5">state-keyed cache</text>
    </g>
    <g>
      <text x="952" y="534" fill="#67e8f9" font-size="22" font-weight="800">3 days</text>
      <text x="952" y="556" fill="#64748b" font-size="11.5">conception → live, bilingual UI</text>
    </g>
    <line x1="316" y1="516" x2="316" y2="560" stroke="#1e293b" stroke-width="1" />
    <line x1="560" y1="516" x2="560" y2="560" stroke="#1e293b" stroke-width="1" />
    <line x1="820" y1="516" x2="820" y2="560" stroke="#1e293b" stroke-width="1" />
  </g>
</svg>
